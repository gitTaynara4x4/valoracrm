<!-- /frontend/clientes.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4X OrçaPro – Clientes</title>

  <!-- Ícones (Font Awesome) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <!-- CSS da página de clientes -->
  <link rel="stylesheet" href="/frontend/css/clientes.css" />
  <link rel="icon" type="image/png" href="/frontend/img/logo-favicon.png" />

  <!-- JS da página -->
  <script src="/frontend/js/pages/clientes.js" type="module" defer></script>
</head>
<body>
  <div class="orca-shell">
    <!-- COLUNA ESQUERDA: menu em iframe -->
    <iframe
      class="orca-menu-frame"
      src="/frontend/menu.html"
      title="Menu 4X OrçaPro"
    ></iframe>

    <!-- COLUNA DIREITA: conteúdo da página de clientes -->
    <main class="orca-main">
      <header class="orca-main-header">
        <div>
          <h1>Clientes</h1>
          <p>Cadastro básico de clientes para uso nas propostas.</p>
        </div>
        <button class="btn-primary" type="button" id="btn-novo-cliente">
          <i class="fa-solid fa-user-plus"></i>&nbsp; Novo cliente
        </button>
      </header>

      <!-- Filtros / busca -->
      <section class="orca-filters">
        <div class="orca-filters-left">
          <div class="orca-field">
            <label for="busca-clientes">Buscar</label>
            <div class="orca-input-icon">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                type="text"
                id="busca-clientes"
                placeholder="Nome, documento, telefone..."
              />
            </div>
          </div>

          <div class="orca-field">
            <label for="filtro-tipo-cliente">Tipo</label>
            <select id="filtro-tipo-cliente">
              <option value="">Todos</option>
              <option value="pf">Pessoa Física</option>
              <option value="pj">Pessoa Jurídica</option>
            </select>
          </div>
        </div>

        <div class="orca-filters-right">
          <span id="contagem-clientes" class="orca-counter">0 clientes</span>
        </div>
      </section>

      <!-- Tabela de clientes -->
      <section class="orca-main-list">
        <div class="orca-table-wrapper">
          <table class="orca-table-clientes">
            <thead>
              <tr>
                <th>Código</th>
                <th>Nome / Fantasia</th>
                <th>Tipo</th>
                <th>Documento</th>
                <th>Cidade / UF</th>
                <th>Telefone</th>
                <th>WhatsApp</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody-clientes">
              <!-- preenchido pelo JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- Modal para cadastro/edição de cliente -->
      <div class="orca-modal-backdrop" id="modal-cliente-backdrop" hidden>
        <div class="orca-modal">
          <header class="orca-modal-header">
            <h2 id="modal-cliente-titulo">Novo cliente</h2>
            <button class="orca-modal-close" type="button" id="btn-fechar-modal-cliente">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </header>

          <div class="orca-modal-body">
            <div class="orca-modal-grid">
              <div class="orca-field">
                <label for="campo-codigo-cliente">Código</label>
                <input type="text" id="campo-codigo-cliente" placeholder="CLI-0001" />
              </div>

              <div class="orca-field">
                <label for="campo-tipo-cliente">Tipo de cliente</label>
                <select id="campo-tipo-cliente">
                  <option value="pf">Pessoa Física</option>
                  <option value="pj">Pessoa Jurídica</option>
                </select>
              </div>

              <div class="orca-field">
                <label for="campo-nome-cliente">Nome / Fantasia</label>
                <input type="text" id="campo-nome-cliente" />
              </div>

              <div class="orca-field">
                <label for="campo-documento-cliente">CPF / CNPJ</label>
                <input type="text" id="campo-documento-cliente" />
              </div>

              <div class="orca-field">
                <label for="campo-telefone-cliente">Telefone</label>
                <input type="text" id="campo-telefone-cliente" />
              </div>

              <div class="orca-field">
                <label for="campo-whatsapp-cliente">WhatsApp</label>
                <input type="text" id="campo-whatsapp-cliente" />
              </div>

              <div class="orca-field">
                <label for="campo-cidade-cliente">Cidade</label>
                <input type="text" id="campo-cidade-cliente" />
              </div>

              <div class="orca-field">
                <label for="campo-uf-cliente">UF</label>
                <input type="text" id="campo-uf-cliente" maxlength="2" style="text-transform:uppercase" />
              </div>
            </div>
          </div>

          <footer class="orca-modal-footer">
            <button class="btn-secondary" type="button" id="btn-cancelar-cliente">
              Cancelar
            </button>
            <button class="btn-primary" type="button" id="btn-salvar-cliente">
              Salvar
            </button>
          </footer>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
