<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurações | Valora CRM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="/frontend/css/app.css" />
  <script src="/frontend/js/pages/app.js" defer></script>
  
  <link rel="stylesheet" href="/frontend/css/configuracoes.css" />
  <script src="/frontend/js/pages/configuracoes.js" defer></script>
</head>
<body>
  <div class="layout">
    <iframe src="/frontend/partials/sidebar.html" class="sidebar-frame" title="Menu lateral"></iframe>

    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <span class="eyebrow">Sistema</span>
          <h1>Configurações</h1>
        </div>
      </header>

      <div class="settings-layout">
        
        <div class="settings-col">
          <article class="panel-card">
            <div class="panel-head">
              <h3>Aparência</h3>
              <p>Personalize como o Valora CRM é exibido no seu dispositivo.</p>
            </div>
            
            <div class="valora-form">
              <div class="form-group">
                <label for="select-tema">Tema do Sistema</label>
                <select id="select-tema">
                  <option value="dark">🌙 Escuro (Padrão)</option>
                  <option value="light">☀️ Claro</option>
                </select>
              </div>
            </div>
          </article>
        </div>

        <div class="settings-col">
          <article class="panel-card">
            <div class="panel-head">
              <h3>Empresa</h3>
              <p>Configurações gerais da sua conta corporativa.</p>
            </div>
            <div class="empty-state-config">
              Em breve: Dados do CNPJ, logo da empresa e integrações.
            </div>
          </article>
        </div>

      </div>
    </main>
  </div>
</body>
</html>
