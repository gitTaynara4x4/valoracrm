<!-- /frontend/inicio.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4X OrçaPro – Início</title>

  <!-- CSS da página inicial (usa o iframe do menu) -->
  <link rel="stylesheet" href="/frontend/css/inicio.css" />
  <link rel="icon" type="image/png" href="/frontend/img/logo-favicon.png" />
</head>
<body>
  <div class="orca-shell">
    <!-- COLUNA ESQUERDA: apenas o menu em iframe -->
    <iframe
      class="orca-menu-frame"
      src="/frontend/menu.html"
      title="Menu 4X OrçaPro"
    ></iframe>

    <!-- COLUNA DIREITA: conteúdo da página inicial -->
    <main class="orca-main">
      <header class="orca-main-header">
        <div>
          <h1>Início</h1>
          <p>Bem-vindo ao painel de orçamentos.</p>
        </div>
        <button class="btn-primary" type="button">
          + Nova proposta
        </button>
      </header>

      <section class="orca-main-placeholder">
        <div class="orca-placeholder-card">
          <h2>Comece pelo menu ao lado</h2>
          <p>
            Use o menu à esquerda para acessar
            <strong>Clientes</strong>, <strong>Produtos</strong>
            e <strong>Propostas</strong>.
          </p>
          <p class="orca-placeholder-hint">
            Depois a gente coloca aqui gráficos, metas e últimos orçamentos aprovados.
          </p>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
