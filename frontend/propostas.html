<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4X Valora – Propostas</title>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="/frontend/css/propostas.css" />
  <script src="/frontend/js/pages/propostas.js" defer></script>
</head>
<body>
  <div class="Valora-shell">
    <iframe class="Valora-menu-frame" src="/frontend/partials/sidebar.html" title="Menu 4X Valora"></iframe>

    <main class="Valora-main">
      <header class="Valora-main-header">
        <div class="Valora-header-left">
          <h1>Propostas</h1>
          <p>Gerencie e monte propostas comerciais.</p>
        </div>

        <div class="Valora-header-actions">
          <button class="btn-primary" type="button" id="btn-nova-proposta">
            <i class="fa-solid fa-file-circle-plus"></i>
            <span>Nova proposta</span>
          </button>
        </div>
      </header>

      <section class="Valora-filters">
        <div class="Valora-field Valora-field--busca">
          <label for="busca-propostas">Buscar</label>
          <div class="Valora-input-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="busca-propostas" type="text" placeholder="Código, título, cliente, status..." autocomplete="off" />
          </div>
        </div>

        <div class="Valora-filters-right">
          <span id="contagem-propostas" class="Valora-counter">0 propostas</span>
        </div>
      </section>

      <section class="Valora-main-list">
        <div class="Valora-table-wrapper">
          <table class="Valora-table-propostas">
            <thead>
              <tr>
                <th>Código</th>
                <th>Título</th>
                <th>Cliente</th>
                <th>Status</th>
                <th>Total</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody-propostas"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- MODAL CENTRAL -->
  <div class="proposal-modal" id="proposal-modal" aria-hidden="true">
    <div class="proposal-modal-backdrop" data-close-modal></div>

    <div class="proposal-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="proposal-modal-title">
      <div class="proposal-modal-header">
        <div>
          <h2 id="proposal-modal-title">Nova proposta</h2>
          <p id="proposal-modal-subtitle">Preencha os dados da proposta e salve.</p>
        </div>

        <div class="proposal-modal-top-actions">
          <button type="button" class="btn-secondary" id="btn-fechar-modal">
            <i class="fa-solid fa-xmark"></i>
            <span>Fechar</span>
          </button>

          <button type="button" class="btn-primary" id="btn-salvar-proposta">
            <i class="fa-solid fa-floppy-disk"></i>
            <span>Salvar</span>
          </button>
        </div>
      </div>

      <div class="proposal-modal-body">
        <section class="proposal-card">
          <div class="proposal-section-head">
            <h3>Dados principais</h3>
            <span class="proposal-status-chip" id="proposal-chip-status">Rascunho</span>
          </div>

          <div class="proposal-grid">
            <div class="field">
              <label for="proposta-codigo">Código</label>
              <input id="proposta-codigo" type="text" placeholder="PROP-0001" />
            </div>

            <div class="field">
              <label for="proposta-titulo">Título</label>
              <input id="proposta-titulo" type="text" placeholder="Ex.: Sistema de CFTV" />
            </div>

            <div class="field">
              <label for="proposta-cliente-id">ID do cliente</label>
              <input id="proposta-cliente-id" type="number" placeholder="Opcional" />
            </div>

            <div class="field">
              <label for="proposta-status">Status</label>
              <select id="proposta-status">
                <option value="rascunho">Rascunho</option>
                <option value="enviada">Enviada</option>
                <option value="aprovada">Aprovada</option>
                <option value="rejeitada">Rejeitada</option>
              </select>
            </div>

            <div class="field">
              <label for="proposta-modelo">Modelo técnico</label>
              <select id="proposta-modelo">
                <option value="">Manual</option>
                <option value="alarme">Alarme</option>
                <option value="cerca">Cerca elétrica</option>
                <option value="concertina">Concertina</option>
                <option value="cftv">CFTV</option>
              </select>
            </div>

            <div class="field">
              <label for="proposta-validade">Validade (dias)</label>
              <input id="proposta-validade" type="text" placeholder="7" />
            </div>

            <div class="field field-full">
              <label for="proposta-observacoes">Observações</label>
              <textarea id="proposta-observacoes" rows="4" placeholder="Observações gerais"></textarea>
            </div>
          </div>
        </section>

        <section class="proposal-card">
          <div class="proposal-section-head">
            <h3>Parâmetros do modelo</h3>
            <button id="btn-gerar-itens" class="btn-secondary" type="button">
              <i class="fa-solid fa-wand-magic-sparkles"></i>
              <span>Gerar itens</span>
            </button>
          </div>

          <div class="proposal-grid">
            <div class="field">
              <label for="param-metragem">Metragem</label>
              <input id="param-metragem" type="number" placeholder="0" />
            </div>

            <div class="field">
              <label for="param-pontos">Pontos</label>
              <input id="param-pontos" type="number" placeholder="0" />
            </div>

            <div class="field">
              <label for="param-cameras">Câmeras</label>
              <input id="param-cameras" type="number" placeholder="0" />
            </div>

            <div class="field">
              <label for="param-cantos">Cantos</label>
              <input id="param-cantos" type="number" placeholder="0" />
            </div>
          </div>
        </section>

        <section class="proposal-card">
          <div class="proposal-section-head">
            <h3>Itens da proposta</h3>
            <button id="btn-add-item" class="btn-secondary" type="button">
              <i class="fa-solid fa-plus"></i>
              <span>Adicionar item</span>
            </button>
          </div>

          <div class="proposal-table-wrap">
            <table class="proposal-items-table">
              <thead>
                <tr>
                  <th>Descrição</th>
                  <th>Qtd</th>
                  <th>Unid.</th>
                  <th>Vlr. Unit.</th>
                  <th>Vlr. Total</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="proposal-items-body"></tbody>
            </table>
          </div>
        </section>

        <section class="proposal-card">
          <div class="proposal-grid">
            <div class="field">
              <label for="proposta-subtotal">Subtotal</label>
              <input id="proposta-subtotal" type="text" placeholder="0,00" />
            </div>

            <div class="field">
              <label for="proposta-desconto">Desconto</label>
              <input id="proposta-desconto" type="text" placeholder="0,00" />
            </div>

            <div class="field">
              <label for="proposta-total">Total</label>
              <input id="proposta-total" type="text" placeholder="0,00" />
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
</body>
</html>
