<!-- /frontend/propostas.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4X OrçaPro – Propostas</title>

  <!-- Ícones (Font Awesome) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <!-- CSS da página de propostas -->
  <link rel="stylesheet" href="/frontend/css/propostas.css" />
  <link rel="icon" type="image/png" href="/frontend/img/logo-favicon.png" />

  <!-- JS da página -->
  <script src="/frontend/js/pages/propostas.js" type="module" defer></script>
</head>
<body>
  <div class="orca-shell">
    <!-- COLUNA ESQUERDA: menu em iframe -->
    <iframe
      class="orca-menu-frame"
      src="/frontend/menu.html"
      title="Menu 4X OrçaPro"
    ></iframe>

    <!-- COLUNA DIREITA: conteúdo da página de propostas -->
    <main class="orca-main">
      <header class="orca-main-header">
        <div>
          <h1>Propostas</h1>
          <p>Emissão e controle de propostas comerciais.</p>
        </div>
        <button class="btn-primary" type="button" id="btn-nova-proposta">
          <i class="fa-solid fa-file-circle-plus"></i>&nbsp; Nova proposta
        </button>
      </header>

      <!-- Filtros / busca -->
      <section class="orca-filters">
        <div class="orca-filters-left">
          <div class="orca-field">
            <label for="busca-propostas">Buscar</label>
            <div class="orca-input-icon">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                type="text"
                id="busca-propostas"
                placeholder="Número, cliente, tipo..."
              />
            </div>
          </div>

          <div class="orca-field">
            <label for="filtro-status-proposta">Status</label>
            <select id="filtro-status-proposta">
              <option value="">Todos</option>
              <option value="rascunho">Rascunho</option>
              <option value="enviada">Enviada</option>
              <option value="aprovada">Aprovada</option>
              <option value="recusada">Recusada</option>
            </select>
          </div>
        </div>

        <div class="orca-filters-right">
          <span id="contagem-propostas" class="orca-counter">0 propostas</span>
        </div>
      </section>

      <!-- Tabela de propostas -->
      <section class="orca-main-list">
        <div class="orca-table-wrapper">
          <table class="orca-table-propostas">
            <thead>
              <tr>
                <th>Nº Proposta</th>
                <th>Cliente</th>
                <th>Tipo</th>
                <th>Valor Total</th>
                <th>Status</th>
                <th>Data</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody-propostas">
              <!-- preenchido pelo JS -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- Modal para cadastro/edição de proposta (cabeçalho simples, sem itens ainda) -->
      <div class="orca-modal-backdrop" id="modal-proposta-backdrop" hidden>
        <div class="orca-modal">
          <header class="orca-modal-header">
            <h2 id="modal-proposta-titulo">Nova proposta</h2>
            <button class="orca-modal-close" type="button" id="btn-fechar-modal-proposta">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </header>

          <div class="orca-modal-body">
            <div class="orca-modal-grid">
              <div class="orca-field">
                <label for="campo-numero-proposta">Nº Proposta</label>
                <input type="text" id="campo-numero-proposta" placeholder="PROP-0001" />
              </div>

              <div class="orca-field">
                <label for="campo-cliente-proposta">Cliente</label>
                <input type="text" id="campo-cliente-proposta" placeholder="Nome / Fantasia do cliente" />
              </div>

              <div class="orca-field">
                <label for="campo-tipo-proposta">Tipo de proposta</label>
                <input type="text" id="campo-tipo-proposta" placeholder="Alarme, CFTV, Cerca, Combo..." />
              </div>

              <div class="orca-field">
                <label for="campo-valor-proposta">Valor total (R$)</label>
                <input
                  type="text"
                  id="campo-valor-proposta"
                  inputmode="decimal"
                  placeholder="R$ 0,00"
                />
              </div>

              <div class="orca-field">
                <label for="campo-status-proposta">Status</label>
                <select id="campo-status-proposta">
                  <option value="rascunho">Rascunho</option>
                  <option value="enviada">Enviada</option>
                  <option value="aprovada">Aprovada</option>
                  <option value="recusada">Recusada</option>
                </select>
              </div>

              <div class="orca-field">
                <label for="campo-data-proposta">Data</label>
                <input type="date" id="campo-data-proposta" />
              </div>

              <div class="orca-field" style="grid-column: 1 / -1;">
                <label for="campo-observacoes-proposta">Observações</label>
                <textarea
                  id="campo-observacoes-proposta"
                  rows="3"
                  placeholder="Condições comerciais, forma de pagamento, validade da proposta..."
                  style="resize: vertical; background:#1f1f1f; border-radius:12px; border:1px solid #333; color:#f5f5f5; padding:8px 10px; font-size:0.85rem;"
                ></textarea>
              </div>
            </div>
          </div>

          <footer class="orca-modal-footer">
            <button class="btn-secondary" type="button" id="btn-cancelar-proposta">
              Cancelar
            </button>
            <button class="btn-primary" type="button" id="btn-salvar-proposta">
              Salvar
            </button>
          </footer>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
