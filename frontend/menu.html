<!-- /frontend/menu.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Menu 4X OrçaPro</title>

  <!-- Ícones (Font Awesome) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <style>
    :root {
      /* Dark fixo do menu */
      --sidebar-bg:        #181818;
      --sidebar-border:    #262626;

      --text-main:         #f5f5f5;
      --text-muted:        #b0b0b0;
      --nav-muted:         #8a8a8a;

      /* Accent (pode trocar depois se quiser azul) */
      --accent:            #10a37f;
      --accent-soft:       rgba(16, 163, 127, 0.16);

      --radius-pill:       999px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--sidebar-bg);
      color: var(--text-main);
    }

    .orca-sidebar {
      width: 260px;
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      padding: 18px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .orca-sidebar-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding: 6px 2px 12px;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .orca-logo-full {
      width: 130px;
      height: auto;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      /* se quiser, tira o shadow */
      /* filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.7)); */
    }

    .orca-logo-caption {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .orca-sidebar-section {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .orca-section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--nav-muted);
      margin: 4px 4px 2px;
    }

    .orca-nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: var(--radius-pill);
      border: 1px solid transparent;
      background: transparent;
      padding: 7px 12px;
      font-size: 0.86rem;
      color: var(--text-muted);
      cursor: pointer;
      text-align: left;
      transition:
        background 0.12s ease,
        border-color 0.12s ease,
        color 0.12s ease,
        transform 0.08s ease;
    }

    .orca-nav-item:hover {
      background: #202020;
      border-color: #2f2f2f;
      color: var(--text-main);
      transform: translateY(-1px);
    }

    .orca-nav-icon {
      width: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: var(--nav-muted);
    }

    .orca-nav-item:hover .orca-nav-icon {
      color: var(--text-main);
    }

    .orca-nav-item--active {
      background: #202020;
      border-color: var(--accent);
      color: #fefefe;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.6);
    }

    .orca-nav-item--active .orca-nav-icon {
      color: var(--accent);
    }

    .orca-sidebar-footer {
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--sidebar-border);
      font-size: 0.75rem;
      color: var(--nav-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .orca-sidebar-version {
      opacity: 0.85;
    }

    .orca-sidebar-badge {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: #e5e7eb;
      background: rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <aside class="orca-sidebar">
    <!-- só adicionei o id, o resto é idêntico -->
    <header class="orca-sidebar-header" id="orca-logo-home">
      <img src="/frontend/img/logo-white.png" alt="4X OrçaPro" class="orca-logo-full" />
      <span class="orca-logo-caption">Painel de orçamentos</span>
    </header>

    <nav class="orca-sidebar-section">
      <p class="orca-section-label">MENU</p>

      <button class="orca-nav-item orca-nav-item--active" data-target="home">
        <span class="orca-nav-icon">
          <i class="fa-solid fa-chart-line"></i>
        </span>
        <span>Início</span>
      </button>

      <button class="orca-nav-item" data-target="clientes">
        <span class="orca-nav-icon">
          <i class="fa-solid fa-user-group"></i>
        </span>
        <span>Clientes</span>
      </button>

      <button class="orca-nav-item" data-target="produtos">
        <span class="orca-nav-icon">
          <i class="fa-solid fa-box-open"></i>
        </span>
        <span>Produtos</span>
      </button>

      <button class="orca-nav-item" data-target="propostas">
        <span class="orca-nav-icon">
          <i class="fa-solid fa-file-signature"></i>
        </span>
        <span>Propostas</span>
      </button>
    </nav>

    <nav class="orca-sidebar-section">
      <p class="orca-section-label">FERRAMENTAS</p>

      <button class="orca-nav-item" data-target="config">
        <span class="orca-nav-icon">
          <i class="fa-solid fa-gear"></i>
        </span>
        <span>Configurações</span>
      </button>

      <button class="orca-nav-item" data-target="ajuda">
        <span class="orca-nav-icon">
          <i class="fa-regular fa-circle-question"></i>
        </span>
        <span>Ajuda</span>
      </button>
    </nav>

    <footer class="orca-sidebar-footer">
      <span class="orca-sidebar-version">v0.1 · 4X OrçaPro</span>
      <span class="orca-sidebar-badge">Beta</span>
    </footer>
  </aside>

  <script>
    // Navegação controlando a JANELA PAI (parent)
    function irPara(target) {
      switch (target) {
        case 'home':
          parent.location.href = '/orca';
          break;
        case 'clientes':
          parent.location.href = '/frontend/clientes.html';
          break;
        case 'produtos':
          parent.location.href = '/frontend/produtos.html';
          break;
        case 'propostas':
          parent.location.href = '/frontend/propostas.html';
          break;
        case 'config':
          parent.location.href = '/frontend/config.html';
          break;
        case 'ajuda':
          parent.location.href = '/frontend/ajuda.html';
          break;
        default:
          console.warn('[Menu OrçaPro] target desconhecido:', target);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Clique nos itens do menu
      document.querySelectorAll('.orca-nav-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const target = btn.dataset.target;
          if (!target) return;
          irPara(target);
        });
      });

      // Clique na logo / header volta pro início
      const logoHeader = document.getElementById('orca-logo-home');
      if (logoHeader) {
        logoHeader.addEventListener('click', () => {
          irPara('home');
        });
      }
    });
  </script>
</body>
</html>
