<!-- /frontend/fornecedores.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4X OrçaPro – Fornecedores</title>

  <!-- Ícones (Font Awesome) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <!-- CSS -->
  <link rel="stylesheet" href="/frontend/css/fornecedores.css" />
  <link rel="icon" type="image/png" href="/frontend/img/logo-favicon.png" />

  <!-- JS -->
  <script src="/frontend/js/pages/fornecedores.js" type="module" defer></script>
</head>

<body>
  <div class="orca-shell">
    <iframe class="orca-menu-frame" src="/frontend/sidebar.html" title="Menu 4X OrçaPro"></iframe>

    <main class="orca-main">
      <header class="orca-main-header">
        <div class="orca-header-left">
          <h1>Fornecedores</h1>
          <p>Cadastro de fornecedores (PF/PJ).</p>
        </div>

        <button class="btn-primary" type="button" id="btn-novo-fornecedor">
          <i class="fa-solid fa-truck-field"></i>&nbsp; Novo fornecedor
        </button>
      </header>

      <section class="orca-filters">
        <div class="orca-filters-left">
          <div class="orca-field orca-field--busca">
            <label for="busca-fornecedores">Buscar</label>
            <div class="orca-input-icon">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input id="busca-fornecedores" type="text" placeholder="Nome, código, WhatsApp..." autocomplete="off" />
            </div>
          </div>

          <div class="orca-field">
            <label for="filtro-tipo-fornecedor">Tipo</label>
            <select id="filtro-tipo-fornecedor">
              <option value="">Todos</option>
              <option value="pf">Pessoa Física</option>
              <option value="pj">Pessoa Jurídica</option>
            </select>
          </div>
        </div>

        <div class="orca-filters-right">
          <span id="contagem-fornecedores" class="orca-counter">0 fornecedores</span>
        </div>
      </section>

      <section class="orca-main-list">
        <div class="orca-table-wrapper">
          <table class="orca-table-fornecedores">
            <thead>
              <tr>
                <th>Código</th>
                <th>Fornecedor</th>
                <th>Tipo</th>
                <th>Cidade / UF</th>
                <th>WhatsApp</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody-fornecedores"></tbody>
          </table>
        </div>
      </section>

      <!-- MODAL -->
      <div class="orca-modal-backdrop" id="modal-fornecedor-backdrop" hidden>
        <div class="orca-modal" role="dialog" aria-modal="true" aria-labelledby="modal-fornecedor-titulo">
          <header class="orca-modal-header">
            <h2 id="modal-fornecedor-titulo">Novo fornecedor</h2>
            <button class="orca-modal-close" type="button" id="btn-fechar-modal-fornecedor" aria-label="Fechar">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </header>

          <div class="orca-modal-body">
            <!-- SEM "Dados Básicos": abre tudo de uma vez (na sequência do PDF) -->

            <div class="orca-modal-grid">
              <!-- Data Cadastro -->
              <div class="orca-field">
                <label for="campo-data-cadastro">Data Cadastro</label>
                <input type="date" id="campo-data-cadastro" readonly />
              </div>

              <!-- Tipo Fornecedor (PF/PJ) -->
              <div class="orca-field">
                <label for="campo-tipo-fornecedor">Tipo Fornecedor</label>
                <select id="campo-tipo-fornecedor">
                  <option value="pf">Pessoa Física</option>
                  <option value="pj">Pessoa Jurídica</option>
                </select>
              </div>

              <!-- Nome identificação -->
              <div class="orca-field orca-field--full">
                <label for="campo-nome-fornecedor">Fornecedor (Nome identificação)</label>
                <input type="text" id="campo-nome-fornecedor" placeholder="Ex.: Loja X / João" />
              </div>

              <!-- Razão Social -->
              <div class="orca-field orca-field--full">
                <label for="campo-razao-social">Razão Social</label>
                <input type="text" id="campo-razao-social" />
              </div>

              <!-- CNPJ -->
              <div class="orca-field">
                <label for="campo-cnpj">CNPJ</label>
                <input type="text" id="campo-cnpj" />
              </div>

              <!-- IE -->
              <div class="orca-field">
                <label for="campo-inscricao-estadual">Inscrição Estadual</label>
                <input type="text" id="campo-inscricao-estadual" />
              </div>

              <!-- IM -->
              <div class="orca-field">
                <label for="campo-inscricao-municipal">Inscrição Municipal</label>
                <input type="text" id="campo-inscricao-municipal" />
              </div>
            </div>

            <!-- Endereço - CEP (mantém auto) -->
            <div class="orca-modal-section">
              <div class="orca-modal-section-title">
                <strong>Endereço - CEP</strong>
                <span>Busca automática via CEP</span>
              </div>

              <div class="orca-modal-grid orca-modal-grid--addr">
                <div class="orca-field">
                  <label for="campo-cep">CEP</label>
                  <input type="text" id="campo-cep" placeholder="00000-000" inputmode="numeric" />
                  <small class="orca-help" id="cep-help"></small>
                </div>

                <div class="orca-field">
                  <label for="campo-logradouro">Rua/Av (auto)</label>
                  <input type="text" id="campo-logradouro" readonly />
                </div>

                <div class="orca-field">
                  <label for="campo-numero">Número</label>
                  <input type="text" id="campo-numero" placeholder="Nº" />
                </div>

                <div class="orca-field">
                  <label for="campo-bairro">Bairro (auto)</label>
                  <input type="text" id="campo-bairro" readonly />
                </div>

                <div class="orca-field">
                  <label for="campo-cidade">Cidade (auto)</label>
                  <input type="text" id="campo-cidade" readonly />
                </div>

                <div class="orca-field">
                  <label for="campo-uf">UF (auto)</label>
                  <input type="text" id="campo-uf" maxlength="2" readonly />
                </div>
              </div>
            </div>

            <!-- Contatos (sequência do PDF) -->
            <div class="orca-modal-grid">
              <div class="orca-field orca-field--full">
                <label for="campo-pessoa-contato">Pessoa Contato</label>
                <input type="text" id="campo-pessoa-contato" />
              </div>

              <div class="orca-field">
                <label for="campo-telefone-pabx">Telefone PABX</label>
                <input type="text" id="campo-telefone-pabx" inputmode="tel" />
              </div>

              <div class="orca-field">
                <label for="campo-telefone">Telefone</label>
                <input type="text" id="campo-telefone" inputmode="tel" />
              </div>

              <div class="orca-field orca-field--full">
                <label for="campo-whatsapp-contato">Telefone Contato (WhatsApp)</label>
                <input type="text" id="campo-whatsapp-contato" placeholder="(DDD) 9XXXX-XXXX" inputmode="tel" />
              </div>

              <div class="orca-field orca-field--full">
                <label for="campo-home-page">Home Page</label>
                <input type="text" id="campo-home-page" placeholder="https://..." />
              </div>

              <div class="orca-field orca-field--full">
                <label for="campo-email-principal">E-Mail</label>
                <input type="text" id="campo-email-principal" inputmode="email" />
              </div>

              <div class="orca-field orca-field--full">
                <label for="campo-redes-sociais">Redes Sociais</label>
                <textarea id="campo-redes-sociais" rows="2" placeholder="Links / @ / observações"></textarea>
              </div>
            </div>

            <!-- Código de Cadastro Fornecedor (sequência do PDF) -->
            <div class="orca-modal-section">
              <div class="orca-modal-section-title">
                <strong>Código de Cadastro Fornecedor</strong>
                <span></span>
              </div>

              <div class="orca-modal-grid">
                <div class="orca-field">
                  <label for="campo-codigo-fornecedor">Código</label>
                  <input type="text" id="campo-codigo-fornecedor" placeholder="FOR-0001" />
                </div>

                <div class="orca-field orca-field--full">
                  <label for="campo-tipo-categoria">Tipo Fornecedor</label>
                  <input type="text" id="campo-tipo-categoria" placeholder="Ex.: Distribuidor, Fabricante, Prestador..." />
                </div>

                <div class="orca-field orca-field--full">
                  <label for="campo-contato-representante">Contato Representante Comercial</label>
                  <input type="text" id="campo-contato-representante" />
                </div>

                <div class="orca-field">
                  <label for="campo-rep-telefone-whatsapp">Telefone/Whatsapp</label>
                  <input type="text" id="campo-rep-telefone-whatsapp" inputmode="tel" />
                </div>

                <div class="orca-field">
                  <label for="campo-rep-telefone-ramal">Telefone/Ramal</label>
                  <input type="text" id="campo-rep-telefone-ramal" inputmode="tel" />
                </div>
              </div>
            </div>

            <!-- Limite de Créditos -->
            <div class="orca-modal-grid">
              <div class="orca-field">
                <label for="campo-limite-creditos">Limite de Créditos</label>
                <input type="number" id="campo-limite-creditos" step="0.01" placeholder="0,00" />
              </div>

              <div class="orca-field orca-field--full">
                <label for="campo-opcao-transportadoras">Opção de Transportadoras / Fretes</label>
                <textarea id="campo-opcao-transportadoras" rows="2" placeholder="Preferências / observações"></textarea>
              </div>
            </div>

            <!-- Linha de Produtos -->
            <div class="orca-modal-section">
              <div class="orca-modal-section-title">
                <strong>Linha de Produtos</strong>
                <span></span>
              </div>

              <div class="orca-modal-grid">
                <div class="orca-field orca-field--full">
                  <label for="campo-linha-produtos">Linha de Produtos</label>
                  <textarea id="campo-linha-produtos" rows="3" placeholder="Descreva a linha / categorias / marcas"></textarea>
                </div>

                <div class="orca-field orca-field--full">
                  <label for="campo-contato-rma">Contato RMA</label>
                  <input type="text" id="campo-contato-rma" />
                </div>

                <div class="orca-field orca-field--full">
                  <label for="campo-informacoes-rma">Informações RMA</label>
                  <textarea id="campo-informacoes-rma" rows="3" placeholder="Procedimentos / prazos / e-mail / links"></textarea>
                </div>
              </div>
            </div>
          </div>

          <footer class="orca-modal-footer">
            <button class="btn-secondary" type="button" id="btn-cancelar-fornecedor">Cancelar</button>
            <button class="btn-primary" type="button" id="btn-salvar-fornecedor">Salvar</button>
          </footer>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
