<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fornecedores | Valora CRM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <link rel="stylesheet" href="/frontend/css/app.css" />
  <link rel="stylesheet" href="/frontend/css/fornecedores.css" />

  <script src="/frontend/js/pages/app.js" defer></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="/frontend/js/pages/fornecedores.js" defer></script>
</head>

<body>
  <div class="layout">
    <iframe src="/frontend/partials/sidebar.html" class="sidebar-frame" title="Menu lateral"></iframe>

    <main class="main">
      <header class="topbar">
        <div class="topbar-title">
          <span class="eyebrow">Gestão de Base</span>
          <h1>Fornecedores</h1>
        </div>

        <div class="topbar-actions">
          <button class="btn btn-secondary" type="button" id="btn-importar-fornecedores">
            <i class="fa-solid fa-file-import" style="margin-right: 6px;"></i> Importar
          </button>
          <button class="btn btn-secondary" type="button" id="btn-exportar-fornecedores-csv">
            <i class="fa-solid fa-file-csv" style="margin-right: 6px;"></i> CSV
          </button>
          <button class="btn btn-secondary" type="button" id="btn-novo-campo">
            <i class="fa-solid fa-sliders" style="margin-right: 6px;"></i> Novo campo
          </button>
          <button class="btn btn-primary" type="button" id="btn-novo-fornecedor">
            <i class="fa-solid fa-truck" style="margin-right: 6px;"></i> Novo Fornecedor
          </button>
          
          <input id="input-importar-fornecedores" type="file" accept=".json,.csv,.xlsx,text/csv" hidden />
        </div>
      </header>

      <div class="search-row">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="busca-fornecedores" type="text" placeholder="Buscar por nome, código, WhatsApp..." autocomplete="off" />
        </div>
        <span id="contagem-fornecedores" class="counter-text">0 fornecedores</span>
      </div>

      <article class="panel-card" style="margin-bottom: 24px;">
        <div class="panel-head" style="display: flex; justify-content: space-between; align-items: center;">
          <div>
            <h3>Campos personalizados</h3>
            <p>Campos exclusivos para o cadastro dos seus fornecedores.</p>
          </div>
          <button class="btn btn-secondary" type="button" id="btn-novo-campo-inline" style="padding: 6px 12px; min-height: auto;">
            <i class="fa-solid fa-plus"></i>
          </button>
        </div>
        <div id="lista-campos-fornecedores" class="campos-grid">
          <div class="empty-state">Nenhum campo personalizado criado ainda.</div>
        </div>
      </article>

      <article class="panel-card" style="padding: 0;">
        <div class="valora-table-wrapper" style="overflow-x: auto;">
          <table class="valora-table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Fornecedor</th>
                <th>WhatsApp</th>
                <th>E-mail</th>
                <th style="text-align: right;">Ações</th>
              </tr>
            </thead>
            <tbody id="tbody-fornecedores">
              <tr><td colspan="5" class="empty-state" style="text-align: center; border:none;">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </article>

      <div class="modal-overlay" id="modal-fornecedor-backdrop" hidden>
        <div class="modal-content modal-lg">
          <div class="modal-header">
            <h3 id="modal-fornecedor-titulo">Novo fornecedor</h3>
            <button class="btn-close" type="button" id="btn-fechar-modal-fornecedor"><i class="fa-solid fa-xmark"></i></button>
          </div>

          <div class="modal-body">
            <form class="valora-form" id="formFornecedor">
              <h4 class="section-title">Dados padrão</h4>
              <div class="form-row">
                <div class="form-group">
                  <label for="campo-codigo-fornecedor">Código</label>
                  <input type="text" id="campo-codigo-fornecedor" disabled />
                </div>
                <div class="form-group">
                  <label for="campo-nome-fornecedor">Nome Completo / Empresa *</label>
                  <input type="text" id="campo-nome-fornecedor" required placeholder="Ex: Distribuidora XYZ" />
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="campo-whatsapp-fornecedor">WhatsApp</label>
                  <input type="text" id="campo-whatsapp-fornecedor" placeholder="(11) 99999-9999" />
                </div>
                <div class="form-group">
                  <label for="campo-email-fornecedor">E-mail</label>
                  <input type="email" id="campo-email-fornecedor" placeholder="contato@fornecedor.com" />
                </div>
              </div>

              <h4 class="section-title" style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border);">Campos Personalizados</h4>
              <div id="custom-fields-container" class="form-row"></div>
            </form>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" type="button" id="btn-cancelar-fornecedor">Cancelar</button>
            <button class="btn btn-primary" type="button" id="btn-salvar-fornecedor">Salvar Fornecedor</button>
          </div>
        </div>
      </div>

      <div class="modal-overlay" id="modal-campo-backdrop" hidden>
        <div class="modal-content">
          <div class="modal-header">
            <h3 id="modal-campo-titulo">Novo campo</h3>
            <button class="btn-close" type="button" id="btn-fechar-modal-campo"><i class="fa-solid fa-xmark"></i></button>
          </div>

          <div class="modal-body">
            <form class="valora-form">
              <div class="form-group">
                <label for="campo-custom-nome">Nome do campo</label>
                <input type="text" id="campo-custom-nome" placeholder="Ex.: Categoria de Produto" />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="campo-custom-tipo">Tipo de resposta</label>
                  <select id="campo-custom-tipo">
                    <option value="texto">Texto curto</option>
                    <option value="textarea">Texto longo</option>
                    <option value="numero">Número</option>
                    <option value="data">Data</option>
                    <option value="select">Lista de opções</option>
                    <option value="checkbox">Caixa de seleção</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="campo-custom-ordem">Ordem no formulário</label>
                  <input type="number" id="campo-custom-ordem" min="0" step="1" placeholder="0" />
                </div>
              </div>
              <div class="form-group" id="wrap-custom-opcoes" hidden>
                <label for="campo-custom-opcoes">Opções da lista (uma por linha)</label>
                <textarea id="campo-custom-opcoes" rows="4" placeholder="Opção A&#10;Opção B"></textarea>
              </div>
              <div class="form-row" style="margin-top: 12px;">
                <label class="custom-checkbox">
                  <input type="checkbox" id="campo-custom-obrigatorio" />
                  <span>Campo Obrigatório</span>
                </label>
                <label class="custom-checkbox">
                  <input type="checkbox" id="campo-custom-ativo" checked />
                  <span>Mostrar no formulário</span>
                </label>
              </div>
            </form>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" type="button" id="btn-cancelar-campo">Cancelar</button>
            <button class="btn btn-primary" type="button" id="btn-salvar-campo">Salvar Campo</button>
          </div>
        </div>
      </div>

      <div class="modal-overlay" id="Valora-confirm-backdrop" hidden>
        <div class="modal-content" style="max-width: 400px; text-align: center;">
          <div class="modal-body" style="padding-top: 24px;">
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 40px; color: var(--danger); margin-bottom: 16px;"></i>
            <h3 id="Valora-confirm-title" style="margin-bottom: 8px;">Confirmar</h3>
            <p id="Valora-confirm-message" style="color: var(--muted); font-size: 14px; margin-bottom: 24px;"></p>
            <div style="display: flex; gap: 12px; justify-content: center;">
              <button class="btn btn-secondary" id="Valora-confirm-cancel">Cancelar</button>
              <button class="btn btn-primary" id="Valora-confirm-ok" style="background: var(--danger); border-color: var(--danger);">Excluir</button>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>
</body>
</html>
