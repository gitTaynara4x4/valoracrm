<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu Valora</title>

  <script>
    (() => {
      const savedTheme = localStorage.getItem('valora_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);

      try {
        if (window.parent && window.parent !== window && window.parent.document) {
          window.parent.document.documentElement.setAttribute('data-theme', savedTheme);
        }
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <style>
    :root {
      --topbar-h: 54px;
      --dropdown-open-h: 340px;

      --navy: #071827;
      --navy-dark: #04101b;
      --navy-soft: #0a2235;

      --logo-blue: #65acde;
      --logo-aqua: #4bc3c7;
      --logo-aqua-dark: #35adb1;

      --hover-top: rgba(101, 172, 222, 0.16);
      --orange: #ff7a59;

      --text: #ffffff;

      --drop-bg: #ffffff;
      --drop-text: #374151;
      --drop-hover: #eef9fc;
      --drop-border: #edf2f7;
      --drop-shadow: 0 14px 32px rgba(7, 24, 39, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: var(--topbar-h);
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: visible !important;
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body.menu-open {
      min-height: var(--dropdown-open-h);
    }

    body.mobile-menu-open {
      min-height: 100dvh !important;
      overflow: visible !important;
    }

    button {
      font-family: inherit;
    }

    .valora-auvo-topbar {
      width: 100%;
      height: var(--topbar-h);
      background: linear-gradient(90deg, var(--navy-dark) 0%, var(--navy) 58%, var(--navy-soft) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0;
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 100;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .brand-btn {
      width: 54px;
      height: var(--topbar-h);
      border: 0;
      background: var(--navy-dark);
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: #ffffff;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      border-radius: 0;
      background: transparent;
      display: block;
      object-fit: contain;
      box-shadow: none;
    }

    .brand-fallback {
      width: 28px;
      height: 28px;
      border-radius: 0;
      background: transparent;
      color: #ffffff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.04em;
      position: relative;
    }

    .brand-fallback::after {
      content: none;
      display: none;
    }

    .desktop-nav {
      height: 100%;
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
      padding-left: 10px;
      overflow: visible;
    }

    .nav-group {
      height: 100%;
      display: flex;
      align-items: center;
      position: relative;
    }

    .nav-trigger,
    .nav-link {
      height: 34px;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
      transition: background 0.16s ease;
    }

    .nav-trigger i {
      font-size: 10px;
      opacity: 0.9;
      transition: transform 0.16s ease;
    }

    .nav-trigger:hover,
    .nav-link:hover,
    .nav-group.is-open .nav-trigger {
      background: var(--hover-top);
    }

    .nav-group.is-open .nav-trigger i {
      transform: rotate(180deg);
    }

    .nav-link.is-active,
    .nav-trigger.is-active {
      background: rgba(101, 172, 222, 0.18);
    }

    .dropdown {
      position: absolute;
      left: 0;
      top: 100%;
      width: 220px;
      background: var(--drop-bg);
      color: var(--drop-text);
      border: 0;
      border-radius: 0 0 6px 6px;
      padding: 6px 0;
      box-shadow: var(--drop-shadow);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.12s ease, visibility 0.12s ease;
      z-index: 999;
    }

    .nav-group.is-open .dropdown {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .dropdown-financeiro {
      width: 248px;
    }

    .dropdown-item {
      width: 100%;
      min-height: 36px;
      border: 0;
      background: transparent;
      color: var(--drop-text);
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      text-align: left;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
      font-size: 12.5px;
      font-weight: 400;
      line-height: 1;
    }

    .dropdown-item:hover,
    .dropdown-item.is-active {
      background: var(--drop-hover);
      color: var(--logo-blue);
    }

    .right-actions {
      margin-left: auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
      flex: 0 0 auto;
      padding-right: 10px;
      min-width: 0;
    }

    .plain-action {
      height: 34px;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0 8px;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.16s ease;
    }

    .plain-action:hover {
      background: var(--hover-top);
    }

    .new-action {
      height: 34px;
      border: 0;
      background: var(--logo-aqua);
      color: #ffffff;
      padding: 0 12px;
      border-radius: 5px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12.5px;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .new-action:hover {
      background: var(--logo-aqua-dark);
      transform: translateY(-1px);
    }

    .new-action .plus {
      font-size: 18px;
      font-weight: 500;
      line-height: 1;
    }

    .bell-btn,
    .settings-trigger {
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #ffffff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.16s ease;
    }

    .bell-btn:hover,
    .settings-trigger:hover,
    .settings-wrap.is-open .settings-trigger {
      background: var(--hover-top);
    }

    .bell-btn::after { display: none; }

    .agenda-badge {
      position: absolute;
      right: 1px;
      top: 1px;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 999px;
      display: none;
      align-items: center;
      justify-content: center;
      background: #ef4444;
      color: #ffffff;
      box-shadow: 0 0 0 2px var(--navy);
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
    }

    .agenda-badge.is-visible { display: inline-flex; }

    .settings-wrap {
      height: 100%;
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .settings-menu {
      position: absolute;
      right: 0;
      top: 100%;
      width: 260px;
      background: #ffffff;
      color: #111827;
      border: 0;
      border-radius: 0 0 6px 6px;
      padding: 10px 0;
      box-shadow: var(--drop-shadow);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.12s ease, visibility 0.12s ease;
      z-index: 999;
    }

    .settings-wrap.is-open .settings-menu {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .settings-title {
      padding: 8px 18px 6px;
      font-size: 10px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .theme-option,
    .settings-link {
      width: 100%;
      min-height: 36px;
      border: 0;
      background: transparent;
      color: #111827;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 11px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
    }

    .theme-option:hover,
    .settings-link:hover {
      background: var(--drop-hover);
      color: var(--logo-blue);
    }

    .theme-radio {
      width: 15px;
      height: 15px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .theme-radio::after {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: transparent;
    }

    .theme-option.is-active .theme-radio {
      border-color: var(--logo-aqua);
    }

    .theme-option.is-active .theme-radio::after {
      background: var(--logo-aqua);
    }

    .settings-divider {
      height: 1px;
      background: var(--drop-border);
      margin: 8px 0;
    }

    .user-wrap {
      height: 100%;
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .user-trigger {
      height: 34px;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0 8px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 72px;
      transition: background 0.16s ease;
    }

    .user-trigger:hover,
    .user-wrap.is-open .user-trigger {
      background: var(--hover-top);
    }

    .user-initials {
      max-width: 42px;
      overflow: hidden;
      white-space: nowrap;
      color: #ffffff;
      font-size: 12.5px;
      font-weight: 500;
    }

    .user-trigger i {
      font-size: 10px;
      opacity: 0.9;
      transition: transform 0.16s ease;
    }

    .user-wrap.is-open .user-trigger i {
      transform: rotate(180deg);
    }

    .user-menu {
      position: absolute;
      right: 0;
      top: 100%;
      width: 230px;
      background: #ffffff;
      color: #111827;
      border: 0;
      border-radius: 0 0 4px 4px;
      padding: 6px 0;
      box-shadow: var(--drop-shadow);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.12s ease, visibility 0.12s ease;
      z-index: 999;
    }

    .user-wrap.is-open .user-menu {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .user-card {
      padding: 10px 18px 12px;
      border-bottom: 1px solid #eef2f7;
      margin-bottom: 4px;
    }

    .user-card strong {
      display: block;
      color: #111827;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-card span {
      display: block;
      color: #64748b;
      margin-top: 3px;
      font-size: 10px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-menu button {
      width: 100%;
      min-height: 40px;
      border: 0;
      background: transparent;
      color: #111827;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
    }

    .user-menu button:hover {
      background: var(--drop-hover);
      color: var(--logo-blue);
    }

    .user-menu button.danger {
      color: #dc2626;
    }

    .user-menu button.danger:hover {
      background: rgba(220, 38, 38, 0.08);
      color: #b91c1c;
    }

    .mobile-menu-btn {
      display: none;
      width: 42px;
      height: 34px;
      border: 0;
      background: transparent;
      color: #ffffff;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
    }

    .mobile-panel {
      display: none;
    }

    .mobile-menu-btn,
    .mobile-panel,
    .mobile-link {
      pointer-events: auto !important;
      touch-action: manipulation;
    }

    @media (max-width: 1240px) {
      .desktop-nav {
        gap: 1px;
        padding-left: 8px;
      }

      .nav-trigger,
      .nav-link {
        padding: 0 7px;
        font-size: 12px;
      }

      .plain-action {
        display: none;
      }
    }

    @media (max-width: 1040px) {
      .new-action .label {
        display: none;
      }

      .new-action {
        width: 36px;
        justify-content: center;
        padding: 0;
      }

      .desktop-nav {
        gap: 0;
      }
    }

    @media (max-width: 920px) {
      :root {
        --topbar-h: 52px;
        --dropdown-open-h: 100vh;
      }

      html,
      body {
        min-height: var(--topbar-h);
      }

      .brand-btn {
        width: 52px;
      }

      .brand-logo,
      .brand-fallback {
        width: 27px;
        height: 27px;
      }

      .desktop-nav {
        display: none;
      }

      .mobile-menu-btn {
        display: inline-flex;
      }

      .right-actions {
        margin-left: auto;
        gap: 3px;
        padding-right: 7px;
      }

      .user-trigger {
        max-width: 60px;
      }

      .user-initials {
        max-width: 30px;
      }

      .mobile-panel {
        position: fixed;
        left: 0;
        right: 0;
        top: var(--topbar-h);
        max-height: calc(100dvh - var(--topbar-h));
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        display: block;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.30);
        transform: translateY(-8px);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: 0.16s ease;
        z-index: 999;
      }

      .mobile-panel.is-open {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .mobile-section {
        padding: 4px 0;
        border-bottom: 1px solid #eef2f7;
      }

      .mobile-title {
        padding: 8px 18px 6px;
        font-size: 10px;
        font-weight: 500;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }

      .mobile-link {
        width: 100%;
        min-height: 42px;
        border: 0;
        background: transparent;
        color: #111827;
        padding: 0 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        text-align: left;
        font-size: 12.5px;
        font-weight: 400;
        cursor: pointer;
      }

      .mobile-link:hover,
      .mobile-link.is-active {
        background: var(--drop-hover);
        color: var(--logo-blue);
      }

      .mobile-link i {
        width: 20px;
        color: var(--logo-blue);
      }

      .settings-menu,
      .user-menu {
        right: 0;
        max-width: calc(100vw - 12px);
      }
    }

    @media (max-width: 520px) {
      .new-action {
        display: none;
      }

      .bell-btn {
        display: none;
      }

      .settings-trigger {
        width: 32px;
        height: 32px;
      }

      .user-trigger {
        width: 42px;
        padding: 0 6px;
      }

      .user-trigger i {
        display: none;
      }

      .user-initials {
        max-width: 30px;
      }

      .settings-menu,
      .user-menu {
        width: min(260px, calc(100vw - 12px));
      }
    }


    /* MENU DARK PRO | V8 */
    html[data-theme="dark"] {
      --navy: #0b1220;
      --navy-dark: #070d18;
      --navy-soft: #111827;
      --hover-top: rgba(75, 195, 199, 0.12);
      --text: #e5e7eb;
      --drop-bg: #182235;
      --drop-text: #e5e7eb;
      --drop-hover: #243247;
      --drop-border: rgba(148, 163, 184, 0.18);
      --drop-shadow: 0 18px 42px rgba(2, 6, 23, 0.42);
    }

    html[data-theme="dark"],
    html[data-theme="dark"] body {
      background: transparent;
      color: #e5e7eb;
    }

    html[data-theme="dark"] .valora-auvo-topbar {
      background: linear-gradient(90deg, #070d18 0%, #0b1220 54%, #111827 100%);
      color: #e5e7eb;
      box-shadow: 0 1px 0 rgba(148, 163, 184, 0.16);
    }

    html[data-theme="dark"] .brand-btn {
      background: #070d18;
      color: #e5e7eb;
      box-shadow: inset -1px 0 0 rgba(148, 163, 184, 0.16);
    }

    html[data-theme="dark"] .brand-btn:hover,
    html[data-theme="dark"] .nav-item:hover,
    html[data-theme="dark"] .new-action:hover,
    html[data-theme="dark"] .bell-btn:hover,
    html[data-theme="dark"] .settings-trigger:hover,
    html[data-theme="dark"] .user-trigger:hover,
    html[data-theme="dark"] .mobile-menu-btn:hover {
      background: rgba(75, 195, 199, 0.12);
      color: #4bc3c7;
    }

    html[data-theme="dark"] .dropdown,
    html[data-theme="dark"] .settings-menu,
    html[data-theme="dark"] .user-menu,
    html[data-theme="dark"] .mobile-panel {
      background: #182235;
      color: #e5e7eb;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-top: 0;
      box-shadow: var(--drop-shadow);
    }

    html[data-theme="dark"] .dropdown-item,
    html[data-theme="dark"] .theme-option,
    html[data-theme="dark"] .settings-link,
    html[data-theme="dark"] .user-menu button,
    html[data-theme="dark"] .mobile-link {
      color: #cbd5e1;
    }

    html[data-theme="dark"] .dropdown-item:hover,
    html[data-theme="dark"] .dropdown-item.is-active,
    html[data-theme="dark"] .theme-option:hover,
    html[data-theme="dark"] .theme-option.is-active,
    html[data-theme="dark"] .settings-link:hover,
    html[data-theme="dark"] .user-menu button:hover,
    html[data-theme="dark"] .mobile-link:hover,
    html[data-theme="dark"] .mobile-link.is-active {
      background: #243247;
      color: #4bc3c7;
    }

    html[data-theme="dark"] .settings-title,
    html[data-theme="dark"] .mobile-title,
    html[data-theme="dark"] .user-card span,
    html[data-theme="dark"] .dropdown-hint {
      color: #94a3b8;
    }

    html[data-theme="dark"] .settings-divider,
    html[data-theme="dark"] .user-card,
    html[data-theme="dark"] .mobile-section {
      border-color: rgba(148, 163, 184, 0.18);
      background: transparent;
    }

    html[data-theme="dark"] .user-card strong,
    html[data-theme="dark"] .user-name,
    html[data-theme="dark"] .mobile-link strong {
      color: #e5e7eb;
    }

    html[data-theme="dark"] .theme-radio {
      border-color: rgba(148, 163, 184, 0.42);
      background: #0f1b2d;
    }

    html[data-theme="dark"] .theme-option.is-active .theme-radio {
      border-color: #4bc3c7;
      box-shadow: 0 0 0 3px rgba(75, 195, 199, 0.14);
    }

    html[data-theme="dark"] .theme-option.is-active .theme-radio::after {
      background: #4bc3c7;
    }



    /* MENU DARK PRO | V10 - fundo do iframe aberto */
    html[data-theme="dark"] {
      --navy: #0f1117;
      --navy-dark: #090b10;
      --navy-soft: #151821;
      --hover-top: rgba(75, 195, 199, 0.12);
      --text: #ececec;
      --drop-bg: #2b2b2b;
      --drop-text: #ececec;
      --drop-hover: #343434;
      --drop-border: rgba(255, 255, 255, 0.10);
      --drop-shadow: 0 22px 56px rgba(0, 0, 0, 0.36);
    }

    html[data-theme="dark"],
    html[data-theme="dark"] body {
      background: transparent !important;
      color: #ececec !important;
    }

    html[data-theme="dark"] body.menu-open::before {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      top: var(--topbar-h);
      height: calc(var(--dropdown-open-h) - var(--topbar-h));
      background:
        radial-gradient(circle at 14% 0%, rgba(75, 195, 199, 0.055), transparent 24rem),
        linear-gradient(180deg, rgba(33, 33, 33, 0.985) 0%, rgba(33, 33, 33, 0.965) 100%);
      pointer-events: none;
      z-index: 1;
    }

    html[data-theme="dark"] .valora-auvo-topbar {
      background: linear-gradient(90deg, #090b10 0%, #0f1117 56%, #151821 100%) !important;
      color: #ececec !important;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.10) !important;
    }

    html[data-theme="dark"] .brand-btn {
      background: #090b10 !important;
      color: #ececec !important;
      box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.10) !important;
    }

    html[data-theme="dark"] .dropdown,
    html[data-theme="dark"] .settings-menu,
    html[data-theme="dark"] .user-menu,
    html[data-theme="dark"] .mobile-panel {
      background: #2b2b2b !important;

    /* MENU DARK PRO | V11 - sem placa gigante no hover/abertura do menu */

    html[data-theme="dark"],
    html[data-theme="dark"] body {
      background: transparent !important;
    }

  </style>
</head>

  <script>
    const CLOSED_HEIGHT = 54;
    const OPEN_HEIGHT_DESKTOP = 340;
    const OPEN_HEIGHT_MOBILE = window.innerHeight || 720;

    /* =========================================================
       FIX DEFINITIVO DO MENU EM IFRAME
       Desktop: o iframe fica só com 54px de altura.
       O dropdown/popover é criado no documento pai, por cima da página.
       Assim NÃO aparece placa branca no tema claro nem no escuro.
       ========================================================= */
    const PARENT_OVERLAY_ID = 'valora-parent-menu-overlay';
    const PARENT_OVERLAY_STYLE_ID = 'valora-parent-menu-overlay-style';
    let parentOutsideListener = null;

    function getFrameHeight(open, mobile) {
      return mobile
        ? Math.max(window.parent?.innerHeight || window.innerHeight || OPEN_HEIGHT_MOBILE, 620)
        : CLOSED_HEIGHT;
    }

    function applyFrameBaseStyle(height = CLOSED_HEIGHT) {
      try {
        const frame = window.frameElement;
        if (!frame) return;

        frame.setAttribute('allowtransparency', 'true');
        frame.setAttribute('scrolling', 'no');

        frame.style.setProperty('position', 'fixed', 'important');
        frame.style.setProperty('top', '0', 'important');
        frame.style.setProperty('left', '0', 'important');
        frame.style.setProperty('right', '0', 'important');
        frame.style.setProperty('width', '100vw', 'important');
        frame.style.setProperty('height', height + 'px', 'important');
        frame.style.setProperty('min-height', height + 'px', 'important');
        frame.style.setProperty('max-height', height + 'px', 'important');
        frame.style.setProperty('border', '0', 'important');
        frame.style.setProperty('outline', '0', 'important');
        frame.style.setProperty('display', 'block', 'important');
        frame.style.setProperty('overflow', 'hidden', 'important');
        frame.style.setProperty('z-index', '99999', 'important');
        frame.style.setProperty('pointer-events', 'auto', 'important');
        frame.style.setProperty('background', 'transparent', 'important');
        frame.style.setProperty('background-color', 'transparent', 'important');
        frame.style.setProperty('box-shadow', 'none', 'important');
        frame.style.removeProperty('clip-path');
        frame.style.removeProperty('-webkit-clip-path');
      } catch (e) {}
    }

    function forceTransparentFrame() {
      try {
        document.documentElement.style.setProperty('background', 'transparent', 'important');
        document.documentElement.style.setProperty('background-color', 'transparent', 'important');
        document.body.style.setProperty('background', 'transparent', 'important');
        document.body.style.setProperty('background-color', 'transparent', 'important');
        applyFrameBaseStyle(CLOSED_HEIGHT);
      } catch (e) {}
    }

    function getParentDocument() {
      try {
        if (window.parent && window.parent !== window && window.parent.document) {
          return window.parent.document;
        }
      } catch (e) {}
      return null;
    }

    function ensureParentOverlayStyles(parentDoc) {
      if (!parentDoc || parentDoc.getElementById(PARENT_OVERLAY_STYLE_ID)) return;

      const style = parentDoc.createElement('style');
      style.id = PARENT_OVERLAY_STYLE_ID;
      style.textContent = `
        body.sidebar-open::before,
        body.sidebar-open::after,
        body.sidebar-mobile-open::before,
        body.sidebar-mobile-open::after {
          content: none !important;
          display: none !important;
        }

        #${PARENT_OVERLAY_ID} {
          position: fixed;
          z-index: 2147483000;
          box-sizing: border-box;
          font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          -webkit-font-smoothing: antialiased;
          text-rendering: geometricPrecision;
        }

        #${PARENT_OVERLAY_ID},
        #${PARENT_OVERLAY_ID} * {
          box-sizing: border-box;
        }

        #${PARENT_OVERLAY_ID} .vp-menu {
          width: 220px;
          padding: 6px 0;
          border: 0;
          border-radius: 0 0 6px 6px;
          background: #ffffff;
          color: #374151;
          box-shadow: 0 14px 32px rgba(7, 24, 39, 0.16);
          overflow: hidden;
        }

        #${PARENT_OVERLAY_ID} .vp-menu.vp-financeiro { width: 248px; }
        #${PARENT_OVERLAY_ID} .vp-menu.vp-settings { width: 230px; border-radius: 0 0 10px 10px; }
        #${PARENT_OVERLAY_ID} .vp-menu.vp-user { width: 250px; border-radius: 0 0 10px 10px; }

        #${PARENT_OVERLAY_ID} .vp-item {
          width: 100%;
          min-height: 36px;
          border: 0;
          background: transparent;
          color: inherit;
          padding: 0 14px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 10px;
          text-align: left;
          cursor: pointer;
          font: inherit;
          font-size: 12.5px;
          font-weight: 400;
          line-height: 1;
          transition: background 0.12s ease, color 0.12s ease;
        }

        #${PARENT_OVERLAY_ID} .vp-item:hover,
        #${PARENT_OVERLAY_ID} .vp-item.is-active {
          background: #eef9fc;
          color: #65acde;
        }

        #${PARENT_OVERLAY_ID} .vp-title {
          padding: 11px 14px 8px;
          color: #64748b;
          font-size: 11px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: .06em;
        }

        #${PARENT_OVERLAY_ID} .vp-divider {
          height: 1px;
          margin: 6px 0;
          background: #edf2f7;
        }

        #${PARENT_OVERLAY_ID} .vp-user-card {
          padding: 12px 14px;
          border-bottom: 1px solid #edf2f7;
        }

        #${PARENT_OVERLAY_ID} .vp-user-card strong {
          display: block;
          color: #172033;
          font-size: 13px;
          font-weight: 600;
          line-height: 1.25;
        }

        #${PARENT_OVERLAY_ID} .vp-user-card span {
          display: block;
          margin-top: 3px;
          color: #64748b;
          font-size: 11.5px;
          line-height: 1.25;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        #${PARENT_OVERLAY_ID} .vp-radio {
          width: 14px;
          height: 14px;
          border-radius: 999px;
          border: 1px solid #cbd5e1;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          flex: 0 0 auto;
        }

        #${PARENT_OVERLAY_ID} .vp-item.is-active .vp-radio::after {
          content: "";
          width: 6px;
          height: 6px;
          border-radius: 999px;
          background: #4bc3c7;
        }

        #${PARENT_OVERLAY_ID} .vp-item.danger { color: #dc2626; }
        #${PARENT_OVERLAY_ID} .vp-item.danger:hover { background: #fef2f2; color: #dc2626; }

        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-menu {
          background: #2b2b2b;
          color: #ececec;
          border: 1px solid rgba(255, 255, 255, 0.10);
          border-top: 0;
          box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
        }

        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-item {
          color: #d6d6d6;
        }

        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-item:hover,
        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-item.is-active {
          background: #343434;
          color: #4bc3c7;
        }

        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-title,
        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-user-card span {
          color: #a3a3a3;
        }

        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-divider,
        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-user-card {
          border-color: rgba(255, 255, 255, 0.10);
        }

        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-divider {
          background: rgba(255, 255, 255, 0.10);
        }

        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-user-card strong {
          color: #ececec;
        }

        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-radio {
          border-color: rgba(255, 255, 255, 0.28);
        }

        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-item.danger { color: #f87171; }
        html[data-theme="dark"] #${PARENT_OVERLAY_ID} .vp-item.danger:hover { background: rgba(239, 68, 68, 0.14); color: #fca5a5; }
      `;

      parentDoc.head.appendChild(style);
    }

    function removeParentOutsideListener(parentDoc) {
      try {
        if (parentDoc && parentOutsideListener) {
          parentDoc.removeEventListener('pointerdown', parentOutsideListener, true);
        }
      } catch (e) {}
      parentOutsideListener = null;
    }

    function closeParentFloatingOverlay() {
      const parentDoc = getParentDocument();
      if (!parentDoc) return;

      removeParentOutsideListener(parentDoc);

      const old = parentDoc.getElementById(PARENT_OVERLAY_ID);
      if (old) old.remove();
    }

    function getSourceButtonTarget(btn) {
      if (!btn) return '';
      if (btn.dataset && btn.dataset.target) return btn.dataset.target;

      const onclick = btn.getAttribute('onclick') || '';
      const match = onclick.match(/irPara\(['"]([^'"]+)['"]\)/);
      return match ? match[1] : '';
    }

    function appendOverlayButton(menu, sourceBtn) {
      if (!menu || !sourceBtn) return;

      const btn = menu.ownerDocument.createElement('button');
      btn.type = 'button';
      btn.className = 'vp-item';
      btn.innerHTML = sourceBtn.innerHTML;

      const target = getSourceButtonTarget(sourceBtn);
      const theme = sourceBtn.dataset ? sourceBtn.dataset.themeOption : '';
      const action = sourceBtn.dataset ? sourceBtn.dataset.action : '';

      if (sourceBtn.classList.contains('danger') || action === 'logout') btn.classList.add('danger');
      if (sourceBtn.classList.contains('is-active')) btn.classList.add('is-active');
      if (theme && (localStorage.getItem('valora_theme') || 'light') === theme) btn.classList.add('is-active');

      btn.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();

        if (theme) {
          applyTheme(theme);
          closeAllMenus();
          return;
        }

        if (action === 'logout' || sourceBtn.classList.contains('danger')) {
          closeAllMenus();
          fazerLogout();
          return;
        }

        if (target) {
          closeAllMenus();
          irPara(target);
        }
      });

      menu.appendChild(btn);
    }

    function appendOverlayContent(menu, sourceSurface) {
      if (!menu || !sourceSurface) return;

      Array.from(sourceSurface.children).forEach((child) => {
        if (child.matches('button')) {
          appendOverlayButton(menu, child);
          return;
        }

        if (child.classList.contains('settings-title')) {
          const title = menu.ownerDocument.createElement('div');
          title.className = 'vp-title';
          title.textContent = child.textContent || '';
          menu.appendChild(title);
          return;
        }

        if (child.classList.contains('settings-divider')) {
          const divider = menu.ownerDocument.createElement('div');
          divider.className = 'vp-divider';
          menu.appendChild(divider);
          return;
        }

        if (child.classList.contains('user-card')) {
          const card = menu.ownerDocument.createElement('div');
          card.className = 'vp-user-card';
          card.innerHTML = child.innerHTML;
          menu.appendChild(card);
        }
      });
    }

    function getOpenParentSurface() {
      const group = document.querySelector('[data-menu-group].is-open');
      if (group) {
        const surface = group.querySelector('.dropdown');
        const anchor = group.querySelector('.nav-trigger') || surface;
        return {
          surface,
          anchor,
          type: surface && surface.classList.contains('dropdown-financeiro') ? 'financeiro' : 'dropdown'
        };
      }

      const settingsWrap = document.querySelector('#settingsWrap.is-open');
      if (settingsWrap) {
        return {
          surface: document.getElementById('settingsMenu'),
          anchor: document.getElementById('settingsBtn'),
          type: 'settings'
        };
      }

      const userWrap = document.querySelector('#userWrap.is-open');
      if (userWrap) {
        return {
          surface: document.getElementById('userDropdown'),
          anchor: document.getElementById('userProfileBtn'),
          type: 'user'
        };
      }

      return null;
    }

    function renderParentFloatingOverlay() {
      const parentDoc = getParentDocument();
      if (!parentDoc || window.innerWidth <= 920) {
        closeParentFloatingOverlay();
        return;
      }

      const item = getOpenParentSurface();
      if (!item || !item.surface || !item.anchor) {
        closeParentFloatingOverlay();
        return;
      }

      ensureParentOverlayStyles(parentDoc);
      closeParentFloatingOverlay();

      const frameRect = window.frameElement
        ? window.frameElement.getBoundingClientRect()
        : { left: 0, top: 0 };

      const surfaceRect = item.surface.getBoundingClientRect();
      const anchorRect = item.anchor.getBoundingClientRect();
      const parentWin = parentDoc.defaultView || window.parent;
      const viewportW = parentWin.innerWidth || parentDoc.documentElement.clientWidth || 1200;

      const width = Math.ceil(surfaceRect.width || (item.type === 'financeiro' ? 248 : item.type === 'user' ? 250 : item.type === 'settings' ? 230 : 220));
      const top = Math.round(frameRect.top + CLOSED_HEIGHT);
      let left = Math.round(frameRect.left + (surfaceRect.left || anchorRect.left));

      if (item.type === 'settings' || item.type === 'user') {
        left = Math.round(frameRect.left + anchorRect.right - width);
      }

      left = Math.max(0, Math.min(left, viewportW - width - 8));

      const overlay = parentDoc.createElement('div');
      overlay.id = PARENT_OVERLAY_ID;
      overlay.style.left = `${left}px`;
      overlay.style.top = `${top}px`;
      overlay.style.width = `${width}px`;

      const menu = parentDoc.createElement('div');
      menu.className = `vp-menu vp-${item.type}`;
      menu.style.width = `${width}px`;
      appendOverlayContent(menu, item.surface);
      overlay.appendChild(menu);

      /*
       * Não usar capture=true aqui.
       * Com capture=true, o overlay interceptava o clique antes do botão interno
       * receber o evento. Resultado: opções como "Tema claro/escuro" pareciam
       * clicar, mas não executavam applyTheme().
       */
      overlay.addEventListener('pointerdown', (event) => event.stopPropagation());
      overlay.addEventListener('click', (event) => event.stopPropagation());

      parentDoc.body.appendChild(overlay);

      parentOutsideListener = (event) => {
        const current = parentDoc.getElementById(PARENT_OVERLAY_ID);
        if (current && current.contains(event.target)) return;
        closeAllMenus();
      };

      setTimeout(() => {
        try {
          parentDoc.addEventListener('pointerdown', parentOutsideListener, true);
        } catch (e) {}
      }, 0);
    }

    function getStoredUser() {
      const nome =
        localStorage.getItem('nome') ||
        localStorage.getItem('user_nome') ||
        localStorage.getItem('usuario_nome') ||
        'Usuário';

      const email =
        localStorage.getItem('email') ||
        localStorage.getItem('user_email') ||
        localStorage.getItem('usuario_email') ||
        'email@empresa.com';

      return { nome, email };
    }

    function initialsFromName(name) {
      const clean = String(name || 'Usuário').trim();

      if (!clean) return 'U';

      const parts = clean.split(/\s+/).filter(Boolean);

      if (parts.length >= 2) {
        return (parts[0][0] + parts[1][0]).toUpperCase();
      }

      return clean.slice(0, 2).toUpperCase();
    }

    function applyUser() {
      const { nome, email } = getStoredUser();

      const nameEl = document.getElementById('sidebarUserName');
      const emailEl = document.getElementById('sidebarUserEmail');
      const initialsEl = document.getElementById('sidebarUserInitials');

      if (nameEl) nameEl.textContent = nome;
      if (emailEl) emailEl.textContent = email;
      if (initialsEl) initialsEl.textContent = initialsFromName(nome);
    }

    function applyTheme(theme) {
      const finalTheme = theme === 'dark' ? 'dark' : 'light';

      localStorage.setItem('valora_theme', finalTheme);
      document.documentElement.setAttribute('data-theme', finalTheme);

      try {
        if (window.parent && window.parent !== window && window.parent.document) {
          window.parent.document.documentElement.setAttribute('data-theme', finalTheme);
        }
      } catch (e) {}

      syncThemeButtons();
      forceTransparentFrame();
    }

    function syncThemeButtons() {
      const current = localStorage.getItem('valora_theme') || 'light';

      document.querySelectorAll('[data-theme-option]').forEach((btn) => {
        btn.classList.toggle('is-active', btn.dataset.themeOption === current);
      });
    }

    function setParentSidebarOpen(open, mobile) {
      try {
        const height = getFrameHeight(open, mobile);

        if (window.frameElement) {
          window.frameElement.classList.toggle('is-open', !!open && !mobile);
          window.frameElement.classList.toggle('is-mobile-open', !!open && !!mobile);
          applyFrameBaseStyle(height);
        }

        if (window.parent && window.parent.document) {
          window.parent.document.body.classList.toggle('sidebar-open', !!open && !mobile);
          window.parent.document.body.classList.toggle('sidebar-mobile-open', !!open && !!mobile);
        }

        if (open && !mobile) {
          renderParentFloatingOverlay();
        } else {
          closeParentFloatingOverlay();
        }
      } catch (e) {}
    }

    function goTo(url) {
      const finalUrl = String(url || '/dashboard');

      try {
        if (window.top && window.top !== window) {
          window.top.location.assign(finalUrl);
          return;
        }
      } catch (e) {}

      try {
        if (window.parent && window.parent !== window) {
          window.parent.location.href = finalUrl;
          return;
        }
      } catch (e) {}

      window.location.assign(finalUrl);
    }

    function abrirNotificacoes() {
      closeAllMenus();
      try {
        if (window.parent && window.parent !== window && window.parent.ValoraAgenda) {
          window.parent.ValoraAgenda.openPanel();
          return;
        }
        window.parent?.postMessage({ type: 'valora-agenda-open' }, window.location.origin);
      } catch (e) {
        try { window.top?.postMessage({ type: 'valora-agenda-open' }, window.location.origin); } catch (_) {}
      }
    }

    window.addEventListener('message', (event) => {
      if (event.origin !== window.location.origin || event.data?.type !== 'valora-agenda-count') return;
      const badge = document.getElementById('agendaBadge');
      if (!badge) return;
      const count = Math.max(0, Number(event.data.count || 0));
      badge.textContent = count > 99 ? '99+' : String(count);
      badge.classList.toggle('is-visible', count > 0);
    });

    function irPara(target) {
      switch (target) {
        case 'home':
          goTo('/dashboard');
          break;

        case 'clientes':
          goTo('/clientes');
          break;

        case 'fornecedores':
          goTo('/fornecedores');
          break;

        case 'cotacoes':
          goTo('/cotacoes');
          break;

        case 'produtos':
          goTo('/produtos');
          break;

        case 'patrimonio':
          goTo('/patrimonio');
          break;

        case 'orcamentos':
          goTo('/orcamentos');
          break;

        case 'propostas':
          goTo('/propostas');
          break;

        case 'area-cliente-admin':
          goTo('/area-cliente-admin');
          break;

        case 'contratos-admin':
          goTo('/contratos-admin');
          break;

        case 'usuarios':
          goTo('/usuarios');
          break;

        case 'config':
          goTo('/configuracoes');
          break;

        case 'formularios':
          goTo('/formularios');
          break;

        case 'ajuda':
          goTo('/ajuda');
          break;

        case 'perfil':
          goTo('/perfil');
          break;

        case 'empresa':
          goTo('/empresa');
          break;

        case 'financeiro':
          goTo('/financeiro');
          break;

        case 'contas-receber':
          goTo('/contas-receber');
          break;

        case 'contas-pagar':
          goTo('/contas-pagar');
          break;

        case 'fluxo-caixa':
          goTo('/fluxo-caixa');
          break;

        case 'categorias-financeiras':
          goTo('/categorias-financeiras');
          break;

        case 'formas-pagamento':
          goTo('/formas-pagamento');
          break;

        case 'contas-bancos':
          goTo('/contas-bancos');
          break;

        case 'relatorios-financeiros':
          goTo('/relatorios-financeiros');
          break;

        default:
          console.warn('[Menu Valora] target desconhecido:', target);
      }
    }

    async function fazerLogout() {
      try {
        const response = await fetch('/api/auth/logout', {
          method: 'POST',
          credentials: 'include',
          headers: {
            Accept: 'application/json',
          },
        });

        if (!response.ok) {
          throw new Error(`Falha no logout: HTTP ${response.status}`);
        }

        const theme = localStorage.getItem('valora_theme') || 'light';

        localStorage.clear();
        sessionStorage.clear();

        localStorage.setItem('valora_theme', theme);

        try {
          if (window.parent && window.parent !== window) {
            window.parent.location.replace('/login');
          } else {
            window.location.replace('/login');
          }
        } catch (e) {
          window.location.replace('/login');
        }
      } catch (error) {
        console.error('Erro ao fazer logout:', error);
        alert('Não foi possível encerrar a sessão. Tente novamente.');
      }
    }

    function normalizePath(path) {
      path = (path || '').toLowerCase().trim();
      path = path.split('?')[0].split('#')[0];
      path = path.replace(/\/+$/, '');
      return path || '/';
    }

    function getParentPath() {
      try {
        if (window.parent && window.parent !== window && window.parent.location) {
          return normalizePath(window.parent.location.pathname || '/');
        }
      } catch (e) {}

      return normalizePath(window.location.pathname || '/');
    }

    function resolveCurrentTargetFromPath(path) {
      if (
        path === '/' ||
        path === '/dashboard' ||
        path === '/home' ||
        path === '/inicio' ||
        path === '/frontend/dashboard.html' ||
        path === '/frontend/inicio.html'
      ) {
        return 'home';
      }

      if (path === '/clientes' || path === '/frontend/clientes.html') return 'clientes';
      if (path === '/fornecedores' || path === '/frontend/fornecedores.html') return 'fornecedores';
      if (path === '/cotacoes' || path === '/frontend/cotacoes.html') return 'cotacoes';
      if (path === '/produtos' || path === '/frontend/produtos.html') return 'produtos';
      if (path === '/patrimonio' || path === '/frontend/patrimonio.html') return 'patrimonio';
      if (path === '/orcamentos' || path === '/frontend/orcamentos.html') return 'orcamentos';
      if (path === '/propostas' || path === '/frontend/propostas.html') return 'propostas';
      if (path === '/area-cliente-admin' || path === '/frontend/area-cliente-admin.html') return 'area-cliente-admin';
      if (path === '/contratos-admin' || path === '/frontend/contratos-admin.html') return 'contratos-admin';
      if (path === '/usuarios' || path === '/frontend/usuarios.html') return 'usuarios';

      if (path === '/financeiro' || path === '/frontend/financeiro.html') return 'financeiro';
      if (path === '/contas-receber' || path === '/frontend/contas-receber.html') return 'contas-receber';
      if (path === '/contas-pagar' || path === '/frontend/contas-pagar.html') return 'contas-pagar';
      if (path === '/fluxo-caixa' || path === '/frontend/fluxo-caixa.html') return 'fluxo-caixa';
      if (path === '/categorias-financeiras' || path === '/frontend/categorias-financeiras.html') return 'categorias-financeiras';
      if (path === '/formas-pagamento' || path === '/frontend/formas-pagamento.html') return 'formas-pagamento';
      if (path === '/contas-bancos' || path === '/frontend/contas-bancos.html') return 'contas-bancos';
      if (path === '/relatorios-financeiros' || path === '/frontend/relatorios-financeiros.html') return 'relatorios-financeiros';

      if (
        path === '/configuracoes' ||
        path === '/config' ||
        path === '/frontend/configuracoes.html' ||
        path === '/frontend/config.html'
      ) {
        return 'config';
      }

      if (path === '/formularios' || path === '/frontend/formularios.html') return 'formularios';
      if (path === '/ajuda' || path === '/frontend/ajuda.html') return 'ajuda';
      if (path === '/perfil' || path === '/frontend/perfil.html') return 'perfil';
      if (path === '/empresa' || path === '/frontend/empresa.html') return 'empresa';

      return 'home';
    }

    function closeAllMenus() {
      closeParentFloatingOverlay();

      document.querySelectorAll('[data-menu-group]').forEach((group) => {
        group.classList.remove('is-open');
      });

      const userWrap = document.getElementById('userWrap');
      const mobilePanel = document.getElementById('mobilePanel');
      const settingsWrap = document.getElementById('settingsWrap');

      if (userWrap) userWrap.classList.remove('is-open');
      if (mobilePanel) mobilePanel.classList.remove('is-open');
      if (settingsWrap) settingsWrap.classList.remove('is-open');

      const mobileBtn = document.getElementById('mobileMenuBtn');

      if (mobileBtn) {
        mobileBtn.setAttribute('aria-expanded', 'false');
        mobileBtn.innerHTML = '<i class="fa-solid fa-bars"></i>';
      }

      document.body.classList.remove('menu-open', 'mobile-menu-open');
      setParentSidebarOpen(false, false);
    }

    function anyMenuOpen() {
      const groupOpen = !!document.querySelector('[data-menu-group].is-open');
      const userOpen = !!document.querySelector('#userWrap.is-open');
      const mobileOpen = !!document.querySelector('#mobilePanel.is-open');
      const settingsOpen = !!document.querySelector('#settingsWrap.is-open');

      return groupOpen || userOpen || mobileOpen || settingsOpen;
    }

    function refreshFrameHeight() {
      const mobile = window.innerWidth <= 920 && !!document.querySelector('#mobilePanel.is-open');
      const open = anyMenuOpen();

      document.body.classList.remove('menu-open');
      document.body.classList.toggle('mobile-menu-open', !!open && !!mobile);

      setParentSidebarOpen(open, mobile);
    }

    function syncActiveMenu() {
      const current = resolveCurrentTargetFromPath(getParentPath());

      document.querySelectorAll('[data-target]').forEach((el) => {
        el.classList.toggle('is-active', el.dataset.target === current);
      });
    }

    function initNavigation() {
      document.addEventListener(
        'click',
        (event) => {
          const btn = event.target.closest('[data-target]');
          if (!btn) return;

          const target = btn.dataset.target;
          if (!target) return;

          event.preventDefault();
          event.stopPropagation();

          closeAllMenus();
          irPara(target);
        },
        true
      );
    }

    function initDropdowns() {
      document.querySelectorAll('[data-menu-group]').forEach((group) => {
        const trigger = group.querySelector('.nav-trigger');
        const dropdown = group.querySelector('.dropdown');

        if (!trigger || !dropdown) return;

        trigger.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();

          const willOpen = !group.classList.contains('is-open');

          document.querySelectorAll('[data-menu-group]').forEach((other) => {
            if (other !== group) other.classList.remove('is-open');
          });

          const userWrap = document.getElementById('userWrap');
          const mobilePanel = document.getElementById('mobilePanel');
          const settingsWrap = document.getElementById('settingsWrap');

          if (userWrap) userWrap.classList.remove('is-open');
          if (mobilePanel) mobilePanel.classList.remove('is-open');
          if (settingsWrap) settingsWrap.classList.remove('is-open');

          group.classList.toggle('is-open', willOpen);
          refreshFrameHeight();
        });

        dropdown.addEventListener('click', (event) => {
          event.stopPropagation();
        });

        group.addEventListener('mouseenter', () => {
          if (window.innerWidth <= 920) return;

          document.querySelectorAll('[data-menu-group]').forEach((other) => {
            if (other !== group) other.classList.remove('is-open');
          });

          const userWrap = document.getElementById('userWrap');
          const settingsWrap = document.getElementById('settingsWrap');

          if (userWrap) userWrap.classList.remove('is-open');
          if (settingsWrap) settingsWrap.classList.remove('is-open');

          group.classList.add('is-open');
          refreshFrameHeight();
        });

        group.addEventListener('mouseleave', () => {
          if (window.innerWidth <= 920) return;
          // No desktop o dropdown fica no documento pai.
          // Fechar no mouseleave causava sumiço ao mover o cursor para o menu.
        });
      });
    }

    function initSettingsMenu() {
      const settingsWrap = document.getElementById('settingsWrap');
      const settingsBtn = document.getElementById('settingsBtn');
      const settingsMenu = document.getElementById('settingsMenu');

      if (!settingsWrap || !settingsBtn || !settingsMenu) return;

      settingsBtn.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();

        document.querySelectorAll('[data-menu-group]').forEach((group) => {
          group.classList.remove('is-open');
        });

        const userWrap = document.getElementById('userWrap');
        const mobilePanel = document.getElementById('mobilePanel');

        if (userWrap) userWrap.classList.remove('is-open');
        if (mobilePanel) mobilePanel.classList.remove('is-open');

        settingsWrap.classList.toggle('is-open');
        refreshFrameHeight();
      });

      settingsMenu.addEventListener('click', (event) => {
        event.stopPropagation();
      });

      document.querySelectorAll('[data-theme-option]').forEach((btn) => {
        btn.addEventListener('click', () => {
          applyTheme(btn.dataset.themeOption);
        });
      });
    }

    function initUserMenu() {
      const userWrap = document.getElementById('userWrap');
      const userBtn = document.getElementById('userProfileBtn');
      const userDropdown = document.getElementById('userDropdown');

      if (!userWrap || !userBtn || !userDropdown) return;

      userBtn.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();

        document.querySelectorAll('[data-menu-group]').forEach((group) => {
          group.classList.remove('is-open');
        });

        const mobilePanel = document.getElementById('mobilePanel');
        const settingsWrap = document.getElementById('settingsWrap');

        if (mobilePanel) mobilePanel.classList.remove('is-open');
        if (settingsWrap) settingsWrap.classList.remove('is-open');

        userWrap.classList.toggle('is-open');
        refreshFrameHeight();
      });

      userDropdown.addEventListener('click', (event) => {
        event.stopPropagation();
      });
    }

    function toggleMobileMenu(force) {
      const btn = document.getElementById('mobileMenuBtn');
      const panel = document.getElementById('mobilePanel');

      if (!btn || !panel) return;

      const willOpen = typeof force === 'boolean' ? force : !panel.classList.contains('is-open');

      document.querySelectorAll('[data-menu-group]').forEach((group) => {
        group.classList.remove('is-open');
      });

      const userWrap = document.getElementById('userWrap');
      const settingsWrap = document.getElementById('settingsWrap');

      if (userWrap) userWrap.classList.remove('is-open');
      if (settingsWrap) settingsWrap.classList.remove('is-open');

      panel.classList.toggle('is-open', willOpen);
      btn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
      btn.innerHTML = willOpen ? '<i class="fa-solid fa-xmark"></i>' : '<i class="fa-solid fa-bars"></i>';

      refreshFrameHeight();
    }

    function initMobileMenu() {
      const btn = document.getElementById('mobileMenuBtn');
      const panel = document.getElementById('mobilePanel');

      if (!btn || !panel) return;

      btn.setAttribute('aria-controls', 'mobilePanel');
      btn.setAttribute('aria-expanded', 'false');

      btn.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        toggleMobileMenu();
      });

      panel.addEventListener('click', (event) => {
        event.stopPropagation();
      });
    }

    function initOutsideClick() {
      document.addEventListener('click', () => {
        closeAllMenus();
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeAllMenus();
        }
      });
    }

    function initResize() {
      window.addEventListener('resize', () => {
        syncActiveMenu();
        refreshFrameHeight();
      });
    }

    function init() {
      const savedTheme = localStorage.getItem('valora_theme') || 'light';

      applyFrameBaseStyle(CLOSED_HEIGHT);
      applyTheme(savedTheme);
      forceTransparentFrame();
      applyUser();
      closeAllMenus();
      syncActiveMenu();
      syncThemeButtons();

      initNavigation();
      initDropdowns();
      initSettingsMenu();
      initUserMenu();
      initMobileMenu();
      initOutsideClick();
      initResize();

      window.addEventListener(
        'load',
        () => {
          applyTheme(localStorage.getItem('valora_theme') || 'light');
          closeAllMenus();
          syncActiveMenu();
        },
        { once: true }
      );
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init, { once: true });
    } else {
      init();
    }
  </script>
</body>
