<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu 4X Valora</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <script>
    (() => {
      const savedTheme = localStorage.getItem('valora_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>

  <style>
    :root {
      /* MODO ESCURO (PADRÃO) */
      --sidebar-bg:        #181818;
      --sidebar-border:    #262626;

      --text-main:         #f5f5f5;
      --text-muted:        #b0b0b0;
      --nav-muted:         #8a8a8a;

      --accent:            #10a37f;
      --accent-soft:       rgba(16, 163, 127, 0.16);
      
      --danger:            #ef4444;
      --danger-soft:       rgba(239, 68, 68, 0.1);

      --radius:            8px;
      
      /* Variáveis de Interação */
      --hover-bg:          #222222;
      --dropdown-bg:       #1e1e1e;
      --dropdown-shadow:   0 10px 25px rgba(0,0,0,0.5);
      --dropdown-hover:    #2a2a2a;
      --mobile-btn-bg:     #202020;
    }

    /* MODO CLARO (INVERSÃO DE CORES) */
    html[data-theme="light"] {
      --sidebar-bg:        #ffffff;
      --sidebar-border:    #e5e7eb;
      
      --text-main:         #111827;
      --text-muted:        #6b7280;
      --nav-muted:         #9ca3af;
      
      --hover-bg:          #f3f4f6;
      --dropdown-bg:       #ffffff;
      --dropdown-shadow:   0 10px 25px rgba(0,0,0,0.08);
      --dropdown-hover:    #f3f4f6;
      --mobile-btn-bg:     #f3f4f6;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--sidebar-bg);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .Valora-sidebar {
      width: 260px;
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      padding: 24px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .Valora-sidebar-header {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      padding: 0 6px 22px;
      border-bottom: 1px solid var(--sidebar-border);
      position: relative;
    }

    .Valora-logo-full {
      width: 228px;
      max-width: 100%;
      height: auto;
      display: block;
      color: var(--text-main);
      image-rendering: -webkit-optimize-contrast;
      user-select: none;
      -webkit-user-drag: none;
      flex-shrink: 0;
    }

    .Valora-logo-full svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .Valora-logo-full text { fill: currentColor; transition: fill 0.2s ease; }
    .Valora-logo-caption {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .Valora-sidebar-section {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .Valora-section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--nav-muted);
      margin: 8px 8px 6px;
    }

    .Valora-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: transparent;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
      width: 100%;
    }

    .Valora-nav-item:hover {
      background: var(--hover-bg);
      color: var(--text-main);
    }

    .Valora-nav-icon {
      width: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: var(--nav-muted);
      transition: all 0.2s ease;
    }

    .Valora-nav-item:hover .Valora-nav-icon { color: var(--text-main); }

    .Valora-nav-item--active {
      background: var(--accent-soft);
      border-color: rgba(16, 163, 127, 0.2);
      color: var(--accent);
    }

    .Valora-nav-item--active .Valora-nav-icon { color: var(--accent); }

    .Valora-user-container {
      margin-top: auto;
      position: relative;
    }

    .Valora-user-profile {
      padding: 12px;
      border-top: 1px solid var(--sidebar-border);
      display: flex;
      align-items: center;
      gap: 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .Valora-user-profile:hover, 
    .Valora-user-profile.active {
      background: var(--hover-bg);
    }

    .Valora-user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    .Valora-user-info {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-grow: 1;
    }

    .Valora-user-info strong {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .Valora-user-info span {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .Valora-user-chevron {
      color: var(--nav-muted);
      font-size: 12px;
      transition: transform 0.2s ease;
    }

    .Valora-user-profile.active .Valora-user-chevron {
      transform: rotate(180deg);
    }

    .Valora-user-dropdown {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--dropdown-bg);
      border: 1px solid var(--sidebar-border);
      border-radius: var(--radius);
      padding: 8px;
      box-shadow: var(--dropdown-shadow);
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 100;
    }

    .Valora-user-dropdown.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .Valora-dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s ease;
    }

    .Valora-dropdown-item:hover {
      background: var(--dropdown-hover);
    }

    .Valora-dropdown-item i {
      color: var(--nav-muted);
      width: 16px;
      text-align: center;
    }

    .Valora-dropdown-divider {
      height: 1px;
      background: var(--sidebar-border);
      margin: 6px 0;
    }

    .Valora-dropdown-item.danger {
      color: var(--danger);
    }

    .Valora-dropdown-item.danger i {
      color: var(--danger);
    }

    .Valora-dropdown-item.danger:hover {
      background: var(--danger-soft);
    }

    .Valora-mobile-close { display: none; }

    body.Valora-is-mobile .Valora-mobile-close {
      display: inline-flex;
      position: absolute;
      right: 6px;
      top: 6px;
      width: 36px;
      height: 36px;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      border: 1px solid var(--sidebar-border);
      background: var(--mobile-btn-bg);
      color: var(--text-main);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body.Valora-is-mobile .Valora-nav-item {
      padding: 10px 12px;
      font-size: 15px;
    }

    body.Valora-is-mobile .Valora-nav-icon { font-size: 16px; }
  </style>
</head>

<body>
  <aside class="Valora-sidebar" id="ValoraSidebar">
    <header class="Valora-sidebar-header">
      <div class="Valora-logo-full" role="img" aria-label="4X Valora">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 360" aria-hidden="true">
          <defs>
            <linearGradient id="valora-sidebar-gradient" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#0D63FF"/>
              <stop offset="100%" stop-color="#15D0A5"/>
            </linearGradient>
          </defs>

          <path d="M140 114 L176 114 L160 140 L124 140 Z" fill="url(#valora-sidebar-gradient)" opacity="0.95"/>
          <text x="90" y="190" font-family="Manrope, Inter, Poppins, Arial, sans-serif" font-size="136" font-weight="700" letter-spacing="11" dominant-baseline="alphabetic">VALORA</text>
        </svg>
      </div>

      <span class="Valora-logo-caption">Painel de Orçamentos</span>

      <button class="Valora-mobile-close" id="ValoraMobileClose" aria-label="Fechar menu">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </header>

    <nav class="Valora-sidebar-section">
      <p class="Valora-section-label">Menu Principal</p>

      <button class="Valora-nav-item" data-target="home">
        <span class="Valora-nav-icon"><i class="fa-solid fa-chart-line"></i></span>
        <span>Visão Geral</span>
      </button>

      <button class="Valora-nav-item" data-target="clientes">
        <span class="Valora-nav-icon"><i class="fa-solid fa-user-group"></i></span>
        <span>Clientes</span>
      </button>

      <button class="Valora-nav-item" data-target="fornecedores">
        <span class="Valora-nav-icon"><i class="fa-solid fa-truck"></i></span>
        <span>Fornecedores</span>
      </button>

      <button class="Valora-nav-item" data-target="produtos">
        <span class="Valora-nav-icon"><i class="fa-solid fa-box-open"></i></span>
        <span>Produtos</span>
      </button>

      <button class="Valora-nav-item" data-target="propostas">
        <span class="Valora-nav-icon"><i class="fa-solid fa-file-signature"></i></span>
        <span>Propostas</span>
      </button>
    </nav>

    <nav class="Valora-sidebar-section">
      <p class="Valora-section-label">Ajustes</p>

      <button class="Valora-nav-item" data-target="config">
        <span class="Valora-nav-icon"><i class="fa-solid fa-gear"></i></span>
        <span>Configurações</span>
      </button>

      <button class="Valora-nav-item" data-target="ajuda">
        <span class="Valora-nav-icon"><i class="fa-regular fa-circle-question"></i></span>
        <span>Central de Ajuda</span>
      </button>
    </nav>

    <div class="Valora-user-container">
      
      <div class="Valora-user-dropdown" id="userDropdown">
        <button class="Valora-dropdown-item" onclick="irPara('perfil')">
          <i class="fa-regular fa-user"></i>
          Meu Perfil
        </button>
        <button class="Valora-dropdown-item" onclick="irPara('empresa')">
          <i class="fa-solid fa-building"></i>
          Minha Empresa
        </button>
        
        <div class="Valora-dropdown-divider"></div>
        
        <button class="Valora-dropdown-item danger" onclick="fazerLogout()">
          <i class="fa-solid fa-arrow-right-from-bracket"></i>
          Sair do Sistema
        </button>
      </div>

      <div class="Valora-user-profile" id="userProfileBtn">
        <div class="Valora-user-avatar" id="sidebarUserInitials">T</div>
        <div class="Valora-user-info">
          <strong id="sidebarUserName">Usuário</strong>
          <span id="sidebarUserEmail">email@empresa.com</span>
        </div>
        <i class="fa-solid fa-chevron-up Valora-user-chevron"></i>
      </div>
    </div>
  </aside>

  <script>
    const nomeSalvo = localStorage.getItem('nome') || 'Usuário';
    const emailSalvo = localStorage.getItem('email') || 'email@empresa.com';
    
    document.getElementById('sidebarUserName').textContent = nomeSalvo;
    document.getElementById('sidebarUserEmail').textContent = emailSalvo;
    document.getElementById('sidebarUserInitials').textContent = nomeSalvo.charAt(0).toUpperCase();

    const userProfileBtn = document.getElementById('userProfileBtn');
    const userDropdown = document.getElementById('userDropdown');

    userProfileBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      userDropdown.classList.toggle('show');
      userProfileBtn.classList.toggle('active');
    });

    document.addEventListener('click', (e) => {
      if (!userDropdown.contains(e.target) && !userProfileBtn.contains(e.target)) {
        userDropdown.classList.remove('show');
        userProfileBtn.classList.remove('active');
      }
    });

    function fazerLogout() {
      console.log('Limpando sessão...');
      localStorage.clear(); 
      if(window.parent) {
         window.parent.location.href = '/frontend/login.html';
      } else {
         window.location.href = '/frontend/login.html';
      }
    }

    function irPara(target) {
      switch (target) {
        case 'home':         parent.location.href = '/frontend/dashboard.html'; break;
        case 'clientes':     parent.location.href = '/frontend/clientes.html'; break;
        case 'fornecedores': parent.location.href = '/frontend/fornecedores.html'; break;
        case 'produtos':     parent.location.href = '/frontend/produtos.html'; break;
        case 'propostas':    parent.location.href = '/frontend/propostas.html'; break;
        case 'config':       parent.location.href = '/frontend/configuracoes.html'; break;
        case 'ajuda':        parent.location.href = '/frontend/ajuda.html'; break;
        case 'perfil':       parent.location.href = '/frontend/perfil.html'; break;
        case 'empresa':      parent.location.href = '/frontend/empresa.html'; break;
        default:
          console.warn('[Menu Valora] target desconhecido:', target);
      }
    }

    function resolveCurrentTargetFromParent() {
      let path = '';
      try {
        if (window.parent && window.parent !== window && window.parent.location) {
          path = window.parent.location.pathname || '';
        } else {
          path = window.location.pathname || '';
        }
      } catch (err) {
        path = window.location.pathname || '';
      }

      if (path === '/frontend/dashboard.html') return 'home';
      if (path.endsWith('/clientes.html')) return 'clientes';
      if (path.endsWith('/fornecedores.html')) return 'fornecedores';
      if (path.endsWith('/produtos.html')) return 'produtos';
      if (path.endsWith('/propostas.html')) return 'propostas';
      if (path.endsWith('/configuracoes.html') || path.endsWith('/config.html')) return 'config';
      if (path.endsWith('/ajuda.html')) return 'ajuda';
      return 'home';
    }

    function labelFromTarget(t) {
      switch (t) {
        case 'home': return 'Visão Geral';
        case 'clientes': return 'Clientes';
        case 'fornecedores': return 'Fornecedores';
        case 'produtos': return 'Produtos';
        case 'propostas': return 'Propostas';
        case 'config': return 'Configurações';
        case 'ajuda': return 'Ajuda';
        default: return 'Menu';
      }
    }

    const MOBILE_BREAKPOINT = 860;

    function canTouchParent() {
      try {
        return !!(window.parent && window.parent !== window && window.parent.document && window.parent.document.body);
      } catch (e) {
        return false;
      }
    }

    function getBestWidth() {
      try {
        if (window.parent && window.parent !== window) {
          if (window.parent.visualViewport && window.parent.visualViewport.width) return window.parent.visualViewport.width;
          if (typeof window.parent.innerWidth === 'number') return window.parent.innerWidth;
        }
      } catch (e) {}
      if (window.visualViewport && window.visualViewport.width) return window.visualViewport.width;
      return window.innerWidth;
    }

    const PARENT_OK = canTouchParent();
    const ROOT_DOC  = PARENT_OK ? window.parent.document : document;
    const ROOT_WIN  = PARENT_OK ? window.parent : window;

    const ID_STYLE  = 'ValoraMobileInjectStyle';
    const ID_TOPBAR = 'ValoraMobileTopbar';
    const ID_OVER   = 'ValoraMobileOverlay';
    const ID_BTN    = 'ValoraMobileBtn';

    function ensureParentCss() {
      if (ROOT_DOC.getElementById(ID_STYLE)) return;

      const st = ROOT_DOC.createElement('style');
      st.id = ID_STYLE;
      st.textContent = `
        :root{
          --Valora-m-bg:#181818;
          --Valora-m-border:#262626;
          --Valora-m-text:#f5f5f5;
          --Valora-m-muted:#b0b0b0;
          --Valora-m-btn:#202020;
          --Valora-m-btn-border:#2f2f2f;

          --Valora-m-safe-top: env(safe-area-inset-top);
          --Valora-m-h: 54px;
          --Valora-m-topbar-h: calc(var(--Valora-m-h) + var(--Valora-m-safe-top));
        }

        html[data-theme="light"] {
          --Valora-m-bg: #ffffff;
          --Valora-m-border: #e5e7eb;
          --Valora-m-text: #111827;
          --Valora-m-muted: #6b7280;
          --Valora-m-btn: #f3f4f6;
          --Valora-m-btn-border: #d1d5db;
        }

        #${ID_TOPBAR}{
          font-family: 'Inter', system-ui, sans-serif;
          position:fixed;
          top:0; left:0; right:0;
          height: var(--Valora-m-topbar-h);
          padding-top: var(--Valora-m-safe-top);
          display:flex;
          align-items:center;
          gap:10px;
          padding-left: 12px;
          padding-right: 12px;
          background: var(--Valora-m-bg);
          border-bottom: 1px solid var(--Valora-m-border);
          z-index: 10020;
          -webkit-font-smoothing: antialiased;
          transition: background 0.2s ease, border-color 0.2s ease;
        }

        #${ID_BTN}{
          width:40px; height:40px;
          display:inline-flex;
          align-items:center;
          justify-content:center;
          border-radius:8px;
          border: 1px solid var(--Valora-m-btn-border);
          background: var(--Valora-m-btn);
          color: var(--Valora-m-text);
          cursor:pointer;
          -webkit-tap-highlight-color: transparent;
          touch-action: manipulation;
          padding: 0;
          transition: all 0.2s ease;
        }
        #${ID_BTN}:hover { background: var(--Valora-m-btn-border); }
        
        #${ID_BTN} svg{
          width: 20px;
          height: 20px;
          display:block;
        }

        #${ID_TOPBAR} .Valora-m-title{
          display:flex;
          flex-direction:column;
          line-height:1.2;
          min-width:0;
        }
        #${ID_TOPBAR} .Valora-m-title strong{
          font-size:14px;
          color: var(--Valora-m-text);
          font-weight:600;
          white-space:nowrap;
          overflow:hidden;
          text-overflow:ellipsis;
        }
        #${ID_TOPBAR} .Valora-m-title span{
          font-size:12px;
          color: var(--Valora-m-muted);
          white-space:nowrap;
          overflow:hidden;
          text-overflow:ellipsis;
        }

        #${ID_OVER}{
          position:fixed;
          inset:0;
          background: rgba(0,0,0,0.62);
          opacity:0;
          pointer-events:none;
          transition: opacity 0.18s ease;
          z-index: 10010;
        }

        html.Valora-mobile-open #${ID_OVER}{
          opacity:1;
          pointer-events:auto;
        }

        html.Valora-mobile-on body{
          padding-top: var(--Valora-m-topbar-h) !important;
        }

        html.Valora-mobile-open body{
          overflow: hidden !important;
          touch-action: none;
        }

        @media (prefers-reduced-motion: reduce){
          #${ID_OVER}{ transition:none; }
        }
      `;
      ROOT_DOC.head.appendChild(st);
    }

    function ensureParentNodes() {
      ensureParentCss();

      let tb = ROOT_DOC.getElementById(ID_TOPBAR);
      if (!tb) {
        tb = ROOT_DOC.createElement('div');
        tb.id = ID_TOPBAR;
        tb.setAttribute('data-Valora-created', '1');

        tb.innerHTML = `
          <button id="${ID_BTN}" aria-label="Abrir menu" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M4 6h16v2H4V6zm0 5h16v2H4v-2zm0 5h16v2H4v-2z"></path>
            </svg>
          </button>
          <div class="Valora-m-title">
            <strong>4X Valora</strong>
            <span id="ValoraMobileSubtitle">Menu</span>
          </div>
        `;
        ROOT_DOC.body.appendChild(tb);
      }

      let ov = ROOT_DOC.getElementById(ID_OVER);
      if (!ov) {
        ov = ROOT_DOC.createElement('div');
        ov.id = ID_OVER;
        ov.setAttribute('aria-hidden', 'true');
        ov.setAttribute('data-Valora-created', '1');
        ROOT_DOC.body.appendChild(ov);
      }

      const btn = ROOT_DOC.getElementById(ID_BTN);
      if (btn && !btn.dataset.bound) {
        btn.dataset.bound = '1';
        btn.addEventListener('click', toggleMobileMenu);
      }
      if (ov && !ov.dataset.bound) {
        ov.dataset.bound = '1';
        ov.addEventListener('click', closeMobileMenu);
      }
    }

    function removeParentNodes() {
      try {
        ROOT_DOC.documentElement.classList.remove('Valora-mobile-on');
        ROOT_DOC.documentElement.classList.remove('Valora-mobile-open');

        const tb = ROOT_DOC.getElementById(ID_TOPBAR);
        const ov = ROOT_DOC.getElementById(ID_OVER);

        if (tb && tb.getAttribute('data-Valora-created') === '1') tb.remove();
        if (ov && ov.getAttribute('data-Valora-created') === '1') ov.remove();
      } catch (e) {}
    }

    function getTopbarHeightPx() {
      try {
        const tb = ROOT_DOC.getElementById(ID_TOPBAR);
        if (!tb) return 54;
        const h = tb.getBoundingClientRect().height;
        return Math.max(48, Math.round(h || 54));
      } catch (e) {
        return 54;
      }
    }

    function revealAncestorsForIframe(fe) {
      try {
        let el = fe;
        while (el && el !== ROOT_DOC.body && el !== ROOT_DOC.documentElement) {
          const cs = ROOT_WIN.getComputedStyle(el);
          if (cs && cs.display === 'none') {
            el.style.setProperty('display', 'contents', 'important');
          }
          el = el.parentElement;
        }
      } catch (e) {}
    }

    function applyIframeDrawerStyles(isMobile, topbarH) {
      const fe = window.frameElement;
      if (!fe) return;

      if (isMobile) {
        revealAncestorsForIframe(fe);

        if (!fe.dataset.ValoraPrevSaved) {
          fe.dataset.ValoraPrevSaved = '1';
          fe.dataset.ValoraPrevStyle = fe.getAttribute('style') || '';
        }

        const topPx = Number(topbarH || 54);

        fe.style.setProperty('display', 'block', 'important');
        fe.style.setProperty('visibility', 'visible', 'important');
        fe.style.setProperty('position', 'fixed', 'important');
        fe.style.setProperty('left', '0', 'important');
        fe.style.setProperty('top', topPx + 'px', 'important');
        fe.style.setProperty('height', 'calc(100vh - ' + topPx + 'px)', 'important');
        fe.style.setProperty('width', 'min(86vw, 320px)', 'important');
        fe.style.setProperty('max-width', '320px', 'important');
        fe.style.setProperty('z-index', '10015', 'important');
        fe.style.setProperty('border', '0', 'important');
        fe.style.setProperty('background', 'transparent', 'important');

        fe.style.setProperty('box-shadow', '12px 0 28px rgba(0,0,0,0.65)', 'important');
        fe.style.setProperty('will-change', 'transform', 'important');
        fe.style.setProperty('transition', 'transform 0.18s ease', 'important');

        if (!ROOT_DOC.documentElement.classList.contains('Valora-mobile-open')) {
          fe.style.setProperty('transform', 'translateX(-110%)', 'important');
          fe.style.setProperty('pointer-events', 'none', 'important');
        }
      } else {
        if (fe.dataset.ValoraPrevSaved) {
          fe.setAttribute('style', fe.dataset.ValoraPrevStyle || '');
          delete fe.dataset.ValoraPrevSaved;
          delete fe.dataset.ValoraPrevStyle;
        }
      }
    }

    function openMobileMenu() {
      if (!ROOT_DOC.documentElement.classList.contains('Valora-mobile-on')) return;

      ROOT_DOC.documentElement.classList.add('Valora-mobile-open');

      const fe = window.frameElement;
      if (fe) {
        fe.style.setProperty('transform', 'translateX(0)', 'important');
        fe.style.setProperty('pointer-events', 'auto', 'important');
      }

      const ov = ROOT_DOC.getElementById(ID_OVER);
      if (ov) ov.setAttribute('aria-hidden', 'false');

      const btn = ROOT_DOC.getElementById(ID_BTN);
      if (btn) btn.setAttribute('aria-expanded', 'true');
    }

    function closeMobileMenu() {
      ROOT_DOC.documentElement.classList.remove('Valora-mobile-open');

      const fe = window.frameElement;
      if (fe) {
        fe.style.setProperty('transform', 'translateX(-110%)', 'important');
        fe.style.setProperty('pointer-events', 'none', 'important');
      }

      const ov = ROOT_DOC.getElementById(ID_OVER);
      if (ov) ov.setAttribute('aria-hidden', 'true');

      const btn = ROOT_DOC.getElementById(ID_BTN);
      if (btn) btn.setAttribute('aria-expanded', 'false');
    }

    function toggleMobileMenu() {
      if (ROOT_DOC.documentElement.classList.contains('Valora-mobile-open')) closeMobileMenu();
      else openMobileMenu();
    }

    function syncMobileMode() {
      const w = getBestWidth();
      const isMobile = w <= MOBILE_BREAKPOINT;

      document.body.classList.toggle('Valora-is-mobile', isMobile);

      if (PARENT_OK && window.frameElement) {
        if (isMobile) {
          ensureParentNodes();
          ROOT_DOC.documentElement.classList.add('Valora-mobile-on');

          try {
            const sub = ROOT_DOC.getElementById('ValoraMobileSubtitle');
            if (sub) sub.textContent = labelFromTarget(resolveCurrentTargetFromParent());
          } catch (e) {}

          const topbarH = getTopbarHeightPx();
          applyIframeDrawerStyles(true, topbarH);

          closeMobileMenu();
        } else {
          removeParentNodes();
          applyIframeDrawerStyles(false);
        }
      }
    }

    function initSidebar() {
      const current = resolveCurrentTargetFromParent();
      const itens = document.querySelectorAll('.Valora-nav-item');

      itens.forEach(btn => {
        const target = btn.dataset.target;
        if (target === current) btn.classList.add('Valora-nav-item--active');
        else btn.classList.remove('Valora-nav-item--active');

        btn.addEventListener('click', () => {
          if (!btn.dataset.target) return;
          closeMobileMenu();
          irPara(btn.dataset.target);
        });
      });

      const logo = document.querySelector('.Valora-logo-full');
      if (logo) {
        logo.style.cursor = 'pointer';
        logo.addEventListener('click', () => {
          closeMobileMenu();
          irPara('home');
        });
      }

      const closeBtn = document.getElementById('ValoraMobileClose');
      if (closeBtn) closeBtn.addEventListener('click', closeMobileMenu);

      syncMobileMode();

      window.addEventListener('resize', syncMobileMode);
      window.addEventListener('orientationchange', syncMobileMode);
      if (window.visualViewport) window.visualViewport.addEventListener('resize', syncMobileMode);

      try {
        if (window.parent && window.parent !== window) {
          window.parent.addEventListener('resize', syncMobileMode);
          if (window.parent.visualViewport) window.parent.visualViewport.addEventListener('resize', syncMobileMode);
        }
      } catch (e) {}

      try {
        ROOT_DOC.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && ROOT_DOC.documentElement.classList.contains('Valora-mobile-open')) {
            closeMobileMenu();
          }
        });
      } catch (e) {}
    }

    (function boot() {
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initSidebar, { once: true });
      } else {
        initSidebar();
      }
      window.addEventListener('load', syncMobileMode, { once: true });
    })();
  </script>
</body>
</html>
