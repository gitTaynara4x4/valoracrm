<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu Valora</title>

  <script>
    (() => {
      const savedTheme = localStorage.getItem('valora_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);

      try {
        if (window.parent && window.parent !== window && window.parent.document) {
          window.parent.document.documentElement.setAttribute('data-theme', savedTheme);
        }
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />

  <style>
    :root {
      --topbar-h: 64px;
      --dropdown-open-h: 300px;

      /* Cores da logo Valora */
      --navy: #071827;
      --navy-dark: #04101B;
      --navy-soft: #0A2235;

      --logo-blue: #65ACDE;
      --logo-aqua: #4BC3C7;
      --logo-aqua-dark: #35ADB1;

      --hover-top: rgba(101, 172, 222, 0.16);
      --orange: #ff7a59;

      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.78);

      --drop-bg: #ffffff;
      --drop-text: #374151;
      --drop-muted: #6b7280;
      --drop-hover: #eef9fc;
      --drop-border: #edf2f7;
      --drop-shadow: 0 14px 32px rgba(7, 24, 39, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: var(--topbar-h);
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: visible;
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body.menu-open {
      min-height: var(--dropdown-open-h);
    }

    button {
      font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .valora-auvo-topbar {
      width: 100%;
      height: var(--topbar-h);
      background: linear-gradient(90deg, var(--navy-dark) 0%, var(--navy) 58%, var(--navy-soft) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0;
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 10;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .brand-btn {
      width: 68px;
      height: var(--topbar-h);
      border: 0;
      background: var(--navy-dark);
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: #ffffff;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: #ffffff;
      display: block;
      object-fit: cover;
      box-shadow: 0 8px 18px rgba(3, 25, 92, 0.18);
    }

    .brand-fallback {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: #ffffff;
      color: var(--navy);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.04em;
      position: relative;
    }

    .brand-fallback::after {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--logo-aqua);
      border: 2px solid #ffffff;
      position: absolute;
      right: 0;
      top: 0;
    }

    .desktop-nav {
      height: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
      padding-left: 18px;
    }

    .nav-group {
      height: 100%;
      display: flex;
      align-items: center;
      position: relative;
    }

    .nav-trigger,
    .nav-link {
      height: 42px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: #ffffff;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .nav-trigger i {
      font-size: 11px;
      opacity: 0.9;
      transition: transform 0.16s ease;
    }

    .nav-trigger:hover,
    .nav-link:hover,
    .nav-group.is-open .nav-trigger {
      background: var(--hover-top);
    }

    .nav-group.is-open .nav-trigger i {
      transform: rotate(180deg);
    }

    .nav-link.is-active {
      background: rgba(101, 172, 222, 0.18);
    }

    .dropdown {
      position: absolute;
      left: 0;
      top: 100%;
      width: 240px;
      background: var(--drop-bg);
      color: var(--drop-text);
      border: 0;
      border-radius: 0 0 4px 4px;
      padding: 8px 0;
      box-shadow: var(--drop-shadow);
      opacity: 0;
      visibility: hidden;
      transform: translateY(0);
      transition: opacity 0.12s ease, visibility 0.12s ease;
      z-index: 20;
    }

    .nav-group.is-open .dropdown {
      opacity: 1;
      visibility: visible;
    }

    .dropdown-item {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--drop-text);
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      text-align: left;
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
      font-size: 15px;
      font-weight: 400;
      line-height: 1;
    }

    .dropdown-item:hover,
    .dropdown-item.is-active {
      background: var(--drop-hover);
      color: var(--logo-blue);
    }

    .right-actions {
      margin-left: auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex: 0 0 auto;
      padding-right: 18px;
    }

    .plain-action {
      height: 40px;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.16s ease;
    }

    .plain-action:hover {
      background: var(--hover-top);
    }

    .new-action {
      height: 40px;
      border: 0;
      background: var(--logo-aqua);
      color: #ffffff;
      padding: 0 14px;
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      transition: background 0.16s ease, transform 0.16s ease;
    }

    .new-action:hover {
      background: var(--logo-aqua-dark);
      transform: translateY(-1px);
    }

    .new-action .plus {
      font-size: 22px;
      font-weight: 500;
      line-height: 1;
    }

    .bell-btn,
    .settings-trigger {
      width: 38px;
      height: 38px;
      border: 0;
      background: transparent;
      color: #ffffff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background 0.16s ease;
    }

    .bell-btn:hover,
    .settings-trigger:hover,
    .settings-wrap.is-open .settings-trigger {
      background: var(--hover-top);
    }

    .bell-btn::after {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--orange);
      position: absolute;
      right: 8px;
      top: 8px;
      box-shadow: 0 0 0 2px var(--navy);
    }

    .settings-wrap {
      height: 100%;
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .settings-trigger i {
      font-size: 15px;
    }

    .settings-menu {
      position: absolute;
      right: 0;
      top: 100%;
      width: 260px;
      background: #ffffff;
      color: #111827;
      border: 0;
      border-radius: 0 0 6px 6px;
      padding: 10px 0;
      box-shadow: var(--drop-shadow);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.12s ease, visibility 0.12s ease;
      z-index: 30;
    }

    .settings-wrap.is-open .settings-menu {
      opacity: 1;
      visibility: visible;
    }

    .settings-title {
      padding: 8px 18px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .theme-option,
    .settings-link {
      width: 100%;
      min-height: 42px;
      border: 0;
      background: transparent;
      color: #111827;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 11px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
    }

    .theme-option:hover,
    .settings-link:hover {
      background: var(--drop-hover);
      color: var(--logo-blue);
    }

    .theme-radio {
      width: 15px;
      height: 15px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .theme-radio::after {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: transparent;
    }

    .theme-option.is-active .theme-radio {
      border-color: var(--logo-aqua);
    }

    .theme-option.is-active .theme-radio::after {
      background: var(--logo-aqua);
    }

    .settings-divider {
      height: 1px;
      background: var(--drop-border);
      margin: 8px 0;
    }

    .user-wrap {
      height: 100%;
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .user-trigger {
      height: 40px;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0 10px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background 0.16s ease;
    }

    .user-trigger:hover,
    .user-wrap.is-open .user-trigger {
      background: var(--hover-top);
    }

    .user-initials {
      max-width: 58px;
      overflow: hidden;
      white-space: nowrap;
      color: #ffffff;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .user-trigger i {
      font-size: 11px;
      opacity: 0.9;
      transition: transform 0.16s ease;
    }

    .user-wrap.is-open .user-trigger i {
      transform: rotate(180deg);
    }

    .user-menu {
      position: absolute;
      right: 0;
      top: 100%;
      width: 230px;
      background: #ffffff;
      color: #111827;
      border: 0;
      border-radius: 0 0 4px 4px;
      padding: 8px 0;
      box-shadow: var(--drop-shadow);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.12s ease, visibility 0.12s ease;
      z-index: 30;
    }

    .user-wrap.is-open .user-menu {
      opacity: 1;
      visibility: visible;
    }

    .user-card {
      padding: 10px 18px 12px;
      border-bottom: 1px solid #eef2f7;
      margin-bottom: 4px;
    }

    .user-card strong {
      display: block;
      color: #111827;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-card span {
      display: block;
      color: #64748b;
      margin-top: 3px;
      font-size: 11px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-menu button {
      width: 100%;
      min-height: 40px;
      border: 0;
      background: transparent;
      color: #111827;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      font-weight: 400;
    }

    .user-menu button:hover {
      background: var(--drop-hover);
      color: var(--logo-blue);
    }

    .user-menu button.danger {
      color: #dc2626;
    }

    .user-menu button.danger:hover {
      background: rgba(220, 38, 38, 0.08);
      color: #b91c1c;
    }

    .mobile-menu-btn {
      display: none;
      width: 42px;
      height: 42px;
      border: 0;
      background: transparent;
      color: #ffffff;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .mobile-panel {
      display: none;
    }

    @media (max-width: 1180px) {
      .desktop-nav {
        gap: 2px;
        padding-left: 10px;
      }

      .nav-trigger,
      .nav-link {
        padding: 0 9px;
        font-size: 13px;
      }

      .plain-action {
        display: none;
      }
    }

    @media (max-width: 920px) {
      :root {
        --dropdown-open-h: 620px;
      }

      .brand-btn {
        width: 58px;
      }

      .mobile-menu-btn {
        display: inline-flex;
      }

      .desktop-nav {
        display: none;
      }

      .new-action .label {
        display: none;
      }

      .right-actions {
        gap: 2px;
        padding-right: 8px;
      }

      .mobile-panel {
        position: fixed;
        left: 0;
        right: 0;
        top: var(--topbar-h);
        max-height: calc(100vh - var(--topbar-h));
        overflow: auto;
        display: block;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.30);
        transform: translateY(-8px);
        opacity: 0;
        visibility: hidden;
        transition: 0.16s ease;
        z-index: 40;
      }

      .mobile-panel.is-open {
        transform: translateY(0);
        opacity: 1;
        visibility: visible;
      }

      .mobile-section {
        padding: 8px 0;
        border-bottom: 1px solid #eef2f7;
      }

      .mobile-title {
        padding: 8px 22px;
        font-size: 11px;
        font-weight: 500;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }

      .mobile-link {
        width: 100%;
        min-height: 44px;
        border: 0;
        background: transparent;
        color: #111827;
        padding: 0 22px;
        display: flex;
        align-items: center;
        gap: 10px;
        text-align: left;
        font-size: 15px;
        font-weight: 400;
        cursor: pointer;
      }

      .mobile-link:hover,
      .mobile-link.is-active {
        background: var(--drop-hover);
        color: var(--logo-blue);
      }

      .mobile-link i {
        width: 20px;
        color: var(--logo-blue);
      }
    }
  </style>
</head>

<body>
  <header class="valora-auvo-topbar">
    <button class="brand-btn" type="button" onclick="irPara('home')" aria-label="Valora">
      <img
        class="brand-logo"
        src="/frontend/img/logo-favicon.jpg"
        alt="Valora"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      />
      <span class="brand-fallback">V</span>
    </button>

    <button class="mobile-menu-btn" id="mobileMenuBtn" type="button" aria-label="Abrir menu">
      <i class="fa-solid fa-bars"></i>
    </button>

    <nav class="desktop-nav" aria-label="Menu principal">
      <div class="nav-group" data-menu-group>
        <button class="nav-trigger" type="button">
          Operação <i class="fa-solid fa-chevron-down"></i>
        </button>

        <div class="dropdown">
          <button class="dropdown-item" type="button" data-target="home">Dashboard</button>
          <button class="dropdown-item" type="button" data-target="propostas">Propostas</button>
          <button class="dropdown-item" type="button" data-target="contratos-admin">Contratos</button>
          <button class="dropdown-item" type="button" data-target="area-cliente-admin">Dados para Contrato</button>
        </div>
      </div>

      <div class="nav-group" data-menu-group>
        <button class="nav-trigger" type="button">
          Cadastros <i class="fa-solid fa-chevron-down"></i>
        </button>

        <div class="dropdown">
          <button class="dropdown-item" type="button" data-target="clientes">Clientes</button>
          <button class="dropdown-item" type="button" data-target="fornecedores">Fornecedores</button>
          <button class="dropdown-item" type="button" data-target="produtos">Produtos</button>
          <button class="dropdown-item" type="button" data-target="usuarios">Usuários</button>
          <button class="dropdown-item" type="button" data-target="empresa">Empresa</button>
        </div>
      </div>

      <div class="nav-group" data-menu-group>
        <button class="nav-trigger" type="button">
          Financeiro <i class="fa-solid fa-chevron-down"></i>
        </button>

        <div class="dropdown">
          <button class="dropdown-item" type="button" data-target="contratos-admin">Contratos</button>
          <button class="dropdown-item" type="button" data-target="propostas">Propostas</button>
          <button class="dropdown-item" type="button" data-target="produtos">Produtos e Serviços</button>
        </div>
      </div>

      <div class="nav-group" data-menu-group>
        <button class="nav-trigger" type="button">
          Relatórios <i class="fa-solid fa-chevron-down"></i>
        </button>

        <div class="dropdown">
          <button class="dropdown-item" type="button" data-target="home">Dashboard</button>
          <button class="dropdown-item" type="button" data-target="formularios">Formulários</button>
        </div>
      </div>

      <button class="nav-link" type="button" data-target="formularios">Formulários</button>
      <button class="nav-link" type="button" data-target="ajuda">Ajuda</button>
    </nav>

    <div class="right-actions">
      <button class="plain-action" type="button" onclick="irPara('ajuda')">
        Primeiros passos
      </button>

      <button class="new-action" type="button" onclick="irPara('propostas')">
        <span class="plus">+</span>
        <span class="label">Nova Proposta</span>
      </button>

      <button class="bell-btn" type="button" onclick="irPara('home')" aria-label="Notificações">
        <i class="fa-solid fa-bell"></i>
      </button>

      <div class="settings-wrap" id="settingsWrap">
        <button class="settings-trigger" id="settingsBtn" type="button" aria-label="Configurações de aparência">
          <i class="fa-solid fa-gear"></i>
        </button>

        <div class="settings-menu" id="settingsMenu">
          <div class="settings-title">Aparência</div>

          <button class="theme-option" type="button" data-theme-option="light">
            <span class="theme-radio"></span>
            <span>Tema claro</span>
          </button>

          <button class="theme-option" type="button" data-theme-option="dark">
            <span class="theme-radio"></span>
            <span>Tema escuro</span>
          </button>

          <div class="settings-divider"></div>

          <button class="settings-link" type="button" onclick="irPara('config')">
            <i class="fa-solid fa-sliders"></i>
            Configurações
          </button>

          <button class="settings-link" type="button" onclick="irPara('empresa')">
            <i class="fa-solid fa-building"></i>
            Minha Empresa
          </button>

          <button class="settings-link" type="button" onclick="irPara('perfil')">
            <i class="fa-regular fa-user"></i>
            Meu Perfil
          </button>
        </div>
      </div>

      <div class="user-wrap" id="userWrap">
        <button class="user-trigger" id="userProfileBtn" type="button">
          <span class="user-initials" id="sidebarUserInitials">U</span>
          <i class="fa-solid fa-chevron-down"></i>
        </button>

        <div class="user-menu" id="userDropdown">
          <div class="user-card">
            <strong id="sidebarUserName">Usuário</strong>
            <span id="sidebarUserEmail">email@empresa.com</span>
          </div>

          <button type="button" onclick="irPara('perfil')">
            <i class="fa-regular fa-user"></i>
            Meu Perfil
          </button>

          <button type="button" onclick="irPara('empresa')">
            <i class="fa-solid fa-building"></i>
            Minha Empresa
          </button>

          <button type="button" onclick="irPara('config')">
            <i class="fa-solid fa-gear"></i>
            Configurações
          </button>

          <button type="button" class="danger" onclick="fazerLogout()">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            Sair do Sistema
          </button>
        </div>
      </div>
    </div>
  </header>

  <div class="mobile-panel" id="mobilePanel">
    <div class="mobile-section">
      <div class="mobile-title">Operação</div>
      <button class="mobile-link" type="button" data-target="home"><i class="fa-solid fa-chart-line"></i> Dashboard</button>
      <button class="mobile-link" type="button" data-target="propostas"><i class="fa-solid fa-file-signature"></i> Propostas</button>
      <button class="mobile-link" type="button" data-target="contratos-admin"><i class="fa-solid fa-file-contract"></i> Contratos</button>
      <button class="mobile-link" type="button" data-target="area-cliente-admin"><i class="fa-solid fa-address-card"></i> Dados para Contrato</button>
    </div>

    <div class="mobile-section">
      <div class="mobile-title">Cadastros</div>
      <button class="mobile-link" type="button" data-target="clientes"><i class="fa-solid fa-user-group"></i> Clientes</button>
      <button class="mobile-link" type="button" data-target="fornecedores"><i class="fa-solid fa-truck"></i> Fornecedores</button>
      <button class="mobile-link" type="button" data-target="produtos"><i class="fa-solid fa-box-open"></i> Produtos</button>
      <button class="mobile-link" type="button" data-target="usuarios"><i class="fa-solid fa-id-badge"></i> Usuários</button>
      <button class="mobile-link" type="button" data-target="empresa"><i class="fa-solid fa-building"></i> Empresa</button>
    </div>

    <div class="mobile-section">
      <div class="mobile-title">Ajustes</div>
      <button class="mobile-link" type="button" data-target="formularios"><i class="fa-solid fa-wand-magic-sparkles"></i> Formulários</button>
      <button class="mobile-link" type="button" data-target="config"><i class="fa-solid fa-gear"></i> Configurações</button>
      <button class="mobile-link" type="button" data-target="ajuda"><i class="fa-regular fa-circle-question"></i> Ajuda</button>
    </div>
  </div>

  <script>
    const CLOSED_HEIGHT = 64;
    const OPEN_HEIGHT_DESKTOP = 320;
    const OPEN_HEIGHT_MOBILE = 620;

    function getStoredUser() {
      const nome =
        localStorage.getItem('nome') ||
        localStorage.getItem('user_nome') ||
        localStorage.getItem('usuario_nome') ||
        'Usuário';

      const email =
        localStorage.getItem('email') ||
        localStorage.getItem('user_email') ||
        localStorage.getItem('usuario_email') ||
        'email@empresa.com';

      return { nome, email };
    }

    function initialsFromName(name) {
      const clean = String(name || 'Usuário').trim();

      if (!clean) return 'U';

      const parts = clean.split(/\s+/).filter(Boolean);

      if (parts.length >= 2) {
        return (parts[0][0] + parts[1][0]).toUpperCase();
      }

      return clean.slice(0, 2).toUpperCase();
    }

    function applyUser() {
      const { nome, email } = getStoredUser();

      const nameEl = document.getElementById('sidebarUserName');
      const emailEl = document.getElementById('sidebarUserEmail');
      const initialsEl = document.getElementById('sidebarUserInitials');

      if (nameEl) nameEl.textContent = nome;
      if (emailEl) emailEl.textContent = email;
      if (initialsEl) initialsEl.textContent = initialsFromName(nome);
    }

    function applyTheme(theme) {
      const finalTheme = theme === 'dark' ? 'dark' : 'light';

      localStorage.setItem('valora_theme', finalTheme);
      document.documentElement.setAttribute('data-theme', finalTheme);

      try {
        if (window.parent && window.parent !== window && window.parent.document) {
          window.parent.document.documentElement.setAttribute('data-theme', finalTheme);
        }
      } catch (e) {}

      syncThemeButtons();
    }

    function syncThemeButtons() {
      const current = localStorage.getItem('valora_theme') || 'light';

      document.querySelectorAll('[data-theme-option]').forEach((btn) => {
        btn.classList.toggle('is-active', btn.dataset.themeOption === current);
      });
    }

    function goTo(url) {
      try {
        if (window.parent && window.parent !== window) {
          window.parent.location.href = url;
        } else {
          window.location.href = url;
        }
      } catch (e) {
        window.location.href = url;
      }
    }

    function irPara(target) {
      switch (target) {
        case 'home':
          goTo('/dashboard');
          break;
        case 'clientes':
          goTo('/clientes');
          break;
        case 'fornecedores':
          goTo('/fornecedores');
          break;
        case 'produtos':
          goTo('/produtos');
          break;
        case 'propostas':
          goTo('/propostas');
          break;
        case 'area-cliente-admin':
          goTo('/area-cliente-admin');
          break;
        case 'contratos-admin':
          goTo('/contratos-admin');
          break;
        case 'usuarios':
          goTo('/usuarios');
          break;
        case 'config':
          goTo('/configuracoes');
          break;
        case 'formularios':
          goTo('/formularios');
          break;
        case 'ajuda':
          goTo('/ajuda');
          break;
        case 'perfil':
          goTo('/perfil');
          break;
        case 'empresa':
          goTo('/empresa');
          break;
        default:
          console.warn('[Menu Valora] target desconhecido:', target);
      }
    }

    async function fazerLogout() {
      try {
        const response = await fetch('/api/auth/logout', {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Accept': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`Falha no logout: HTTP ${response.status}`);
        }

        const theme = localStorage.getItem('valora_theme') || 'light';

        localStorage.clear();
        sessionStorage.clear();

        localStorage.setItem('valora_theme', theme);

        try {
          if (window.parent && window.parent !== window) {
            window.parent.location.replace('/login');
          } else {
            window.location.replace('/login');
          }
        } catch (e) {
          window.location.replace('/login');
        }
      } catch (error) {
        console.error('Erro ao fazer logout:', error);
        alert('Não foi possível encerrar a sessão. Tente novamente.');
      }
    }

    function normalizePath(path) {
      path = (path || '').toLowerCase().trim();
      path = path.split('?')[0].split('#')[0];
      path = path.replace(/\/+$/, '');
      return path || '/';
    }

    function getParentPath() {
      try {
        if (window.parent && window.parent !== window && window.parent.location) {
          return normalizePath(window.parent.location.pathname || '/');
        }
      } catch (e) {}

      return normalizePath(window.location.pathname || '/');
    }

    function resolveCurrentTargetFromPath(path) {
      if (
        path === '/' ||
        path === '/dashboard' ||
        path === '/home' ||
        path === '/inicio' ||
        path === '/frontend/dashboard.html' ||
        path === '/frontend/inicio.html'
      ) {
        return 'home';
      }

      if (path === '/clientes' || path === '/frontend/clientes.html') return 'clientes';
      if (path === '/fornecedores' || path === '/frontend/fornecedores.html') return 'fornecedores';
      if (path === '/produtos' || path === '/frontend/produtos.html') return 'produtos';
      if (path === '/propostas' || path === '/frontend/propostas.html') return 'propostas';
      if (path === '/area-cliente-admin' || path === '/frontend/area-cliente-admin.html') return 'area-cliente-admin';
      if (path === '/contratos-admin' || path === '/frontend/contratos-admin.html') return 'contratos-admin';
      if (path === '/usuarios' || path === '/frontend/usuarios.html') return 'usuarios';
      if (path === '/configuracoes' || path === '/config' || path === '/frontend/configuracoes.html' || path === '/frontend/config.html') return 'config';
      if (path === '/formularios' || path === '/frontend/formularios.html') return 'formularios';
      if (path === '/ajuda' || path === '/frontend/ajuda.html') return 'ajuda';
      if (path === '/perfil' || path === '/frontend/perfil.html') return 'perfil';
      if (path === '/empresa' || path === '/frontend/empresa.html') return 'empresa';

      return 'home';
    }

    function setFrameHeight(open) {
      document.body.classList.toggle('menu-open', !!open);

      try {
        if (window.frameElement) {
          const isMobile = window.innerWidth <= 920;
          const h = open ? (isMobile ? OPEN_HEIGHT_MOBILE : OPEN_HEIGHT_DESKTOP) : CLOSED_HEIGHT;

          window.frameElement.style.height = h + 'px';
          window.frameElement.style.minHeight = h + 'px';
          window.frameElement.style.maxHeight = h + 'px';
          window.frameElement.style.overflow = 'visible';
          window.frameElement.style.zIndex = '99999';
        }
      } catch (e) {}
    }

    function closeAllMenus() {
      document.querySelectorAll('[data-menu-group]').forEach((group) => {
        group.classList.remove('is-open');
      });

      const userWrap = document.getElementById('userWrap');
      const mobilePanel = document.getElementById('mobilePanel');
      const settingsWrap = document.getElementById('settingsWrap');

      if (userWrap) userWrap.classList.remove('is-open');
      if (mobilePanel) mobilePanel.classList.remove('is-open');
      if (settingsWrap) settingsWrap.classList.remove('is-open');

      setFrameHeight(false);
    }

    function anyMenuOpen() {
      const groupOpen = !!document.querySelector('[data-menu-group].is-open');
      const userOpen = !!document.querySelector('#userWrap.is-open');
      const mobileOpen = !!document.querySelector('#mobilePanel.is-open');
      const settingsOpen = !!document.querySelector('#settingsWrap.is-open');

      return groupOpen || userOpen || mobileOpen || settingsOpen;
    }

    function refreshFrameHeight() {
      setFrameHeight(anyMenuOpen());
    }

    function syncActiveMenu() {
      const current = resolveCurrentTargetFromPath(getParentPath());

      document.querySelectorAll('[data-target]').forEach((el) => {
        el.classList.toggle('is-active', el.dataset.target === current);
      });
    }

    function initNavigation() {
      document.querySelectorAll('[data-target]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const target = btn.dataset.target;

          if (!target) return;

          closeAllMenus();
          irPara(target);
        });
      });
    }

    function initDropdowns() {
      document.querySelectorAll('[data-menu-group]').forEach((group) => {
        const trigger = group.querySelector('.nav-trigger');
        const dropdown = group.querySelector('.dropdown');

        if (!trigger || !dropdown) return;

        trigger.addEventListener('click', (event) => {
          event.stopPropagation();

          const willOpen = !group.classList.contains('is-open');

          document.querySelectorAll('[data-menu-group]').forEach((other) => {
            if (other !== group) other.classList.remove('is-open');
          });

          const userWrap = document.getElementById('userWrap');
          const mobilePanel = document.getElementById('mobilePanel');
          const settingsWrap = document.getElementById('settingsWrap');

          if (userWrap) userWrap.classList.remove('is-open');
          if (mobilePanel) mobilePanel.classList.remove('is-open');
          if (settingsWrap) settingsWrap.classList.remove('is-open');

          group.classList.toggle('is-open', willOpen);
          refreshFrameHeight();
        });

        dropdown.addEventListener('click', (event) => {
          event.stopPropagation();
        });

        group.addEventListener('mouseenter', () => {
          if (window.innerWidth <= 920) return;

          document.querySelectorAll('[data-menu-group]').forEach((other) => {
            if (other !== group) other.classList.remove('is-open');
          });

          const userWrap = document.getElementById('userWrap');
          const settingsWrap = document.getElementById('settingsWrap');

          if (userWrap) userWrap.classList.remove('is-open');
          if (settingsWrap) settingsWrap.classList.remove('is-open');

          group.classList.add('is-open');
          refreshFrameHeight();
        });

        group.addEventListener('mouseleave', () => {
          if (window.innerWidth <= 920) return;

          group.classList.remove('is-open');
          refreshFrameHeight();
        });
      });
    }

    function initSettingsMenu() {
      const settingsWrap = document.getElementById('settingsWrap');
      const settingsBtn = document.getElementById('settingsBtn');
      const settingsMenu = document.getElementById('settingsMenu');

      if (!settingsWrap || !settingsBtn || !settingsMenu) return;

      settingsBtn.addEventListener('click', (event) => {
        event.stopPropagation();

        document.querySelectorAll('[data-menu-group]').forEach((group) => {
          group.classList.remove('is-open');
        });

        const userWrap = document.getElementById('userWrap');
        const mobilePanel = document.getElementById('mobilePanel');

        if (userWrap) userWrap.classList.remove('is-open');
        if (mobilePanel) mobilePanel.classList.remove('is-open');

        settingsWrap.classList.toggle('is-open');
        refreshFrameHeight();
      });

      settingsMenu.addEventListener('click', (event) => {
        event.stopPropagation();
      });

      document.querySelectorAll('[data-theme-option]').forEach((btn) => {
        btn.addEventListener('click', () => {
          applyTheme(btn.dataset.themeOption);
        });
      });
    }

    function initUserMenu() {
      const userWrap = document.getElementById('userWrap');
      const userBtn = document.getElementById('userProfileBtn');
      const userDropdown = document.getElementById('userDropdown');

      if (!userWrap || !userBtn || !userDropdown) return;

      userBtn.addEventListener('click', (event) => {
        event.stopPropagation();

        document.querySelectorAll('[data-menu-group]').forEach((group) => {
          group.classList.remove('is-open');
        });

        const mobilePanel = document.getElementById('mobilePanel');
        const settingsWrap = document.getElementById('settingsWrap');

        if (mobilePanel) mobilePanel.classList.remove('is-open');
        if (settingsWrap) settingsWrap.classList.remove('is-open');

        userWrap.classList.toggle('is-open');
        refreshFrameHeight();
      });

      userDropdown.addEventListener('click', (event) => {
        event.stopPropagation();
      });
    }

    function initMobileMenu() {
      const btn = document.getElementById('mobileMenuBtn');
      const panel = document.getElementById('mobilePanel');

      if (!btn || !panel) return;

      btn.addEventListener('click', (event) => {
        event.stopPropagation();

        document.querySelectorAll('[data-menu-group]').forEach((group) => {
          group.classList.remove('is-open');
        });

        const userWrap = document.getElementById('userWrap');
        const settingsWrap = document.getElementById('settingsWrap');

        if (userWrap) userWrap.classList.remove('is-open');
        if (settingsWrap) settingsWrap.classList.remove('is-open');

        panel.classList.toggle('is-open');
        refreshFrameHeight();
      });

      panel.addEventListener('click', (event) => {
        event.stopPropagation();
      });
    }

    function initOutsideClick() {
      document.addEventListener('click', () => {
        closeAllMenus();
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeAllMenus();
        }
      });
    }

    function initResize() {
      window.addEventListener('resize', () => {
        syncActiveMenu();
        refreshFrameHeight();
      });
    }

    function init() {
      const savedTheme = localStorage.getItem('valora_theme') || 'light';

      applyTheme(savedTheme);
      applyUser();
      setFrameHeight(false);
      syncActiveMenu();
      syncThemeButtons();

      initNavigation();
      initDropdowns();
      initSettingsMenu();
      initUserMenu();
      initMobileMenu();
      initOutsideClick();
      initResize();

      window.addEventListener('load', () => {
        applyTheme(localStorage.getItem('valora_theme') || 'light');
        setFrameHeight(false);
        syncActiveMenu();
      }, { once: true });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init, { once: true });
    } else {
      init();
    }
  </script>
</body>
</html>
