<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Entrar | Valora CRM</title>

  <script>
    (() => {
      const savedTheme = localStorage.getItem('valora_theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <link rel="icon" type="image/jpeg" href="/frontend/img/logo-favicon.jpg" />

  <link rel="stylesheet" href="/frontend/css/login.css?v=20260630-dark-chatgpt-v6" />
  <link rel="stylesheet" href="/frontend/css/validacao.css?v=20260614-required-circle" />

  <script src="/frontend/js/shared/validacao.js?v=20260614-required-circle" defer></script>
  <script src="/frontend/js/pages/login.js?v=20260624-valora-final-normal" defer></script>
  <link rel="stylesheet" href="/frontend/css/dark-chatgpt-fix.css?v=20260630-dark-pro-v11" />
</head>

<body>
  <main class="login-layout">
    <section class="login-hero" aria-label="Apresentação do Valora CRM">
      <img
        src="/frontend/img/login-valora-hero.png"
        alt="Gestão inteligente para clientes, propostas e faturamento"
        class="login-hero-image"
        decoding="async"
        fetchpriority="high"
      >
    </section>

    <section class="login-panel" aria-label="Acesso ao Valora CRM">
      <div class="login-panel-inner">
        <header class="login-brand">
          <img
            class="login-logo-full"
            src="/frontend/img/logo-valora.svg"
            alt="Valora CRM"
          >
        </header>

        <div class="login-heading">
          <h2>Entrar no sistema</h2>
          <p>Acesse sua conta para continuar.</p>
        </div>

        <form id="form-login" class="login-form" novalidate>
          <div id="step1-fields">
            <div class="form-field">
              <label for="email">E-mail</label>

              <div class="input-box">
                <i class="fa-regular fa-envelope"></i>

                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="seuemail@empresa.com.br"
                  autocomplete="email"
                  required
                >
              </div>
            </div>

            <div class="form-field">
              <label for="senha">Senha</label>

              <div class="input-box">
                <i class="fa-solid fa-lock"></i>

                <input
                  type="password"
                  id="senha"
                  name="senha"
                  placeholder="Digite sua senha"
                  autocomplete="current-password"
                  required
                >

                <button type="button" id="togglePassBtn" class="eye-btn" aria-label="Mostrar senha">
                  <i class="fa-regular fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="login-options">
              <label class="remember">
                <input type="checkbox" id="remember">
                <span></span>
                Manter conectado
              </label>

              <a href="#" class="forgot-link">Esqueci a senha</a>
            </div>
          </div>

          <div id="step2-fields" class="hidden">
            <div class="token-message">
              <div class="token-icon">
                <i class="fa-solid fa-shield-halved"></i>
              </div>

              <div>
                <strong>Verificação de segurança</strong>
                <p id="token-info">Digite o código enviado para o seu e-mail.</p>
              </div>
            </div>

            <div class="form-field">
              <label for="login-token">Código de acesso</label>

              <div class="input-box token-input-box">
                <input
                  type="text"
                  id="login-token"
                  name="login-token"
                  placeholder="000000"
                  maxlength="6"
                  inputmode="numeric"
                  autocomplete="one-time-code"
                >
              </div>
            </div>

            <button type="button" id="btn-token-back" class="back-btn">
              <i class="fa-solid fa-arrow-left"></i>
              Voltar
            </button>
          </div>

          <div id="erro" class="error-box hidden"></div>

          <button type="submit" id="btn-login" class="login-submit">
            <span>Entrar</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <footer class="login-footer">
          <p>Problemas para acessar? <a href="#">Fale com o suporte</a></p>
        </footer>
      </div>
    </section>
  </main>
</body>
</html>
